<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7A6655"/>
      <stop offset="100%" stop-color="#8E7A68"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9A8070"/>
      <stop offset="100%" stop-color="#B89778"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B89778"/>
      <stop offset="100%" stop-color="#C8A98A"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C8A98A"/>
      <stop offset="100%" stop-color="#E0C0A0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#B89778" stroke-width="0.1" opacity="0.15"/>
  </pattern>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <!-- Corner brackets -->
  <path d="M 36 80 L 36 36 L 80 36" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>
  <path d="M 1120 36 L 1164 36 L 1164 80" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>
  <path d="M 36 520 L 36 564 L 80 564" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>
  <path d="M 1120 564 L 1164 564 L 1164 520" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>

  <!-- Header -->
  <text x="600" y="88" font-family="'Cormorant Garamond', Georgia, serif" font-size="32" font-weight="700" fill="#FFFFFF" text-anchor="middle">Engagement Ring Cost by Metal</text>
  <text x="600" y="118" font-family="Inter, sans-serif" font-size="14" fill="#8E9196" text-anchor="middle">Solitaire · 1ct Natural Diamond · Pre-HST · Toronto 2026</text>
  <line x1="440" y1="133" x2="760" y2="133" stroke="#B89778" stroke-width="1" opacity="0.5"/>

  <!-- Bar chart area -->
  <!-- Y axis label -->
  <text x="90" y="200" font-family="Inter, sans-serif" font-size="11" fill="#8E9196" text-anchor="middle" transform="rotate(-90, 90, 340)">Price (CAD)</text>

  <!-- Grid lines -->
  <line x1="160" y1="180" x2="1100" y2="180" stroke="#2C2C2C" stroke-width="1"/>
  <line x1="160" y1="260" x2="1100" y2="260" stroke="#2C2C2C" stroke-width="1"/>
  <line x1="160" y1="340" x2="1100" y2="340" stroke="#2C2C2C" stroke-width="1"/>
  <line x1="160" y1="420" x2="1100" y2="420" stroke="#2C2C2C" stroke-width="1"/>
  <line x1="160" y1="460" x2="1100" y2="460" stroke="#B89778" stroke-width="0.8" opacity="0.4"/>

  <!-- Y axis values -->
  <text x="150" y="184" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="end">$10,000</text>
  <text x="150" y="264" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="end">$8,000</text>
  <text x="150" y="344" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="end">$6,000</text>
  <text x="150" y="424" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="end">$4,000</text>

  <!-- Bar 1: 10K Gold $5,800 — maps to y=460-(5800/10000)*280=460-162.4=297.6, height=162.4 -->
  <rect x="220" y="297" width="160" height="163" rx="4" fill="url(#bar1)"/>
  <text x="300" y="285" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">$5,800</text>
  <text x="300" y="482" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#D4CFC5" text-anchor="middle">10K Gold</text>
  <text x="300" y="500" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="middle">Most affordable</text>

  <!-- Bar 2: 14K Gold $6,500 — y=460-(6500/10000)*280=460-182=278, height=182 -->
  <rect x="460" y="278" width="160" height="182" rx="4" fill="url(#bar2)"/>
  <!-- Popular badge -->
  <rect x="460" y="248" width="160" height="24" rx="12" fill="#B89778"/>
  <text x="540" y="264" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#0A0A0A" text-anchor="middle" letter-spacing="1">MOST POPULAR</text>
  <text x="540" y="266" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">$6,500</text>
  <text x="540" y="266" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle" dy="2">$6,500</text>
  <text x="540" y="482" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#D4CFC5" text-anchor="middle">14K Gold</text>
  <text x="540" y="500" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="middle">Best value</text>

  <!-- Bar 3: 18K Gold $7,500 — y=460-(7500/10000)*280=460-210=250, height=210 -->
  <rect x="700" y="250" width="160" height="210" rx="4" fill="url(#bar3)"/>
  <text x="780" y="238" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">$7,500</text>
  <text x="780" y="482" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#D4CFC5" text-anchor="middle">18K Gold</text>
  <text x="780" y="500" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="middle">Richest colour</text>

  <!-- Bar 4: Platinum $8,200 — y=460-(8200/10000)*280=460-229.6=230.4, height=229.6 -->
  <rect x="940" y="230" width="160" height="230" rx="4" fill="url(#bar4)"/>
  <text x="1020" y="218" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">$8,200</text>
  <text x="1020" y="482" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#D4CFC5" text-anchor="middle">Platinum</text>
  <text x="1020" y="500" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="middle">Hypoallergenic</text>

  <!-- Note -->
  <text x="600" y="540" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="middle">Source: Al-Asali Jewelry Studio, Toronto · 1ct Natural G-H, VS clarity solitaire · HST not included</text>

  <!-- Footer -->
  <rect x="0" y="570" width="1200" height="30" fill="#0D0B0A"/>
  <line x1="0" y1="570" x2="1200" y2="570" stroke="#B89778" stroke-width="0.8" opacity="0.5"/>
  <text x="600" y="589" font-family="Inter, sans-serif" font-size="11" fill="#8E9196" text-anchor="middle" letter-spacing="1.5">AL-ASALI CUSTOM JEWELRY  ·  alasalicustomjewelry.ca</text>
</svg>
