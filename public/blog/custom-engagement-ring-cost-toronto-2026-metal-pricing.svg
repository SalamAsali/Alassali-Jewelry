<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#B89778" stroke-width="0.1" opacity="0.12"/>
  </pattern>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <!-- Corner brackets -->
  <path d="M 36 80 L 36 36 L 80 36" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>
  <path d="M 1120 36 L 1164 36 L 1164 80" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>
  <path d="M 36 520 L 36 564 L 80 564" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>
  <path d="M 1120 564 L 1164 564 L 1164 520" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>

  <!-- Header -->
  <text x="600" y="88" font-family="'Cormorant Garamond', Georgia, serif" font-size="34" font-weight="700" fill="#FFFFFF" text-anchor="middle">Choosing Your Metal</text>
  <text x="600" y="118" font-family="Inter, sans-serif" font-size="13" fill="#8E9196" text-anchor="middle">durability · colour · skin compatibility · craftsmanship</text>
  <line x1="400" y1="133" x2="800" y2="133" stroke="#B89778" stroke-width="1" opacity="0.5"/>

  <!-- 4 metal cards in 2x2 grid -->

  <!-- 10K Gold -->
  <rect x="80" y="155" width="480" height="155" rx="8" fill="#131313" stroke="#B89778" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="320" y="200" font-family="'Cormorant Garamond', Georgia, serif" font-size="26" font-weight="700" fill="#B89778" text-anchor="middle">10K Gold</text>
  <text x="320" y="228" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5" text-anchor="middle">41.7% pure gold</text>
  <text x="320" y="252" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="middle">Most durable · scratch-resistant · budget-friendly</text>
  <text x="320" y="274" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="middle">Ideal for active lifestyles</text>
  <rect x="100" y="286" width="100" height="4" rx="2" fill="#B89778" opacity="0.5"/>
  <text x="200" y="293" font-family="Inter, sans-serif" font-size="11" fill="#8E9196"> Durability</text>
  <text x="100" y="308" font-family="Inter, sans-serif" font-size="11" fill="#D4CFC5">Available in yellow, white, rose</text>

  <!-- 14K Gold -->
  <rect x="640" y="155" width="480" height="155" rx="8" fill="#1A1410" stroke="#B89778" stroke-width="1.2"/>
  <text x="880" y="195" font-family="'Cormorant Garamond', Georgia, serif" font-size="26" font-weight="700" fill="#B89778" text-anchor="middle">14K Gold  ★</text>
  <text x="880" y="223" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5" text-anchor="middle">58.3% pure gold</text>
  <text x="880" y="247" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="middle">Most popular choice · balance of purity &amp; strength</text>
  <text x="880" y="269" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="middle">Rich colour · hypoallergenic options</text>
  <text x="656" y="300" font-family="Inter, sans-serif" font-size="11" fill="#B89778">Most requested at Al-Asali</text>

  <!-- 18K Gold -->
  <rect x="80" y="330" width="480" height="155" rx="8" fill="#131313" stroke="#B89778" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="320" y="375" font-family="'Cormorant Garamond', Georgia, serif" font-size="26" font-weight="700" fill="#B89778" text-anchor="middle">18K Gold</text>
  <text x="320" y="403" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5" text-anchor="middle">75% pure gold</text>
  <text x="320" y="427" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="middle">Richest colour · finest lustre · premium feel</text>
  <text x="320" y="449" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="middle">Softer — best for occasional wear</text>
  <text x="100" y="474" font-family="Inter, sans-serif" font-size="11" fill="#D4CFC5">Preferred for luxury heirloom pieces</text>

  <!-- Platinum -->
  <rect x="640" y="330" width="480" height="155" rx="8" fill="#131313" stroke="#B89778" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="880" y="375" font-family="'Cormorant Garamond', Georgia, serif" font-size="26" font-weight="700" fill="#D4CFC5" text-anchor="middle">Platinum</text>
  <text x="880" y="403" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5" text-anchor="middle">95% pure platinum</text>
  <text x="880" y="427" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="middle">Rarest metal · naturally white · hypoallergenic</text>
  <text x="880" y="449" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="middle">Heavier weight · prestige option</text>
  <text x="656" y="474" font-family="Inter, sans-serif" font-size="11" fill="#D4CFC5">Develops a rich patina over time</text>

  <!-- Footer -->
  <rect x="0" y="570" width="1200" height="30" fill="#0D0B0A"/>
  <line x1="0" y1="570" x2="1200" y2="570" stroke="#B89778" stroke-width="0.8" opacity="0.5"/>
  <text x="600" y="589" font-family="Inter, sans-serif" font-size="11" fill="#8E9196" text-anchor="middle" letter-spacing="1.5">AL-ASALI CUSTOM JEWELRY  ·  alasalicustomjewelry.ca</text>
</svg>
