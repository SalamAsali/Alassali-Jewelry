<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#B89778" stroke-width="0.1" opacity="0.12"/>
  </pattern>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <!-- Corner brackets -->
  <path d="M 36 80 L 36 36 L 80 36" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>
  <path d="M 1120 36 L 1164 36 L 1164 80" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>
  <path d="M 36 520 L 36 564 L 80 564" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>
  <path d="M 1120 564 L 1164 564 L 1164 520" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>

  <!-- Header -->
  <text x="600" y="88" font-family="'Cormorant Garamond', Georgia, serif" font-size="34" font-weight="700" fill="#FFFFFF" text-anchor="middle">Lab-Grown vs Natural — What You Should Know</text>
  <text x="600" y="118" font-family="Inter, sans-serif" font-size="13" fill="#8E9196" text-anchor="middle">same sparkle · same hardness · very different price points</text>
  <line x1="360" y1="133" x2="840" y2="133" stroke="#B89778" stroke-width="1" opacity="0.5"/>

  <!-- Two-column comparison -->

  <!-- Lab-Grown side -->
  <rect x="80" y="155" width="490" height="360" rx="8" fill="#131313" stroke="#B89778" stroke-width="1.2"/>
  <rect x="80" y="155" width="490" height="52" rx="8" fill="#1A1410"/>
  <rect x="80" y="187" width="490" height="20" fill="#1A1410"/>
  <text x="325" y="188" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#B89778" text-anchor="middle">Lab-Grown Diamond</text>
  <text x="325" y="208" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="middle">grown in a controlled environment</text>

  <text x="325" y="248" font-family="'Cormorant Garamond', Georgia, serif" font-size="22" fill="#FFFFFF" text-anchor="middle">Chemically identical to mined</text>
  <line x1="110" y1="265" x2="540" y2="265" stroke="#B89778" stroke-width="0.5" opacity="0.3"/>

  <text x="110" y="296" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#B89778">Advantages</text>
  <text x="110" y="318" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5">· Significantly lower price point</text>
  <text x="110" y="338" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5">· Same hardness (10 on Mohs scale)</text>
  <text x="110" y="358" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5">· Larger carat for the same budget</text>
  <text x="110" y="378" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5">· Ethically sourced, conflict-free</text>

  <text x="110" y="412" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#8E9196">Consider if</text>
  <text x="110" y="432" font-family="Inter, sans-serif" font-size="13" fill="#8E9196">· Maximizing size on a budget</text>
  <text x="110" y="452" font-family="Inter, sans-serif" font-size="13" fill="#8E9196">· Not planning to resell</text>
  <text x="110" y="472" font-family="Inter, sans-serif" font-size="13" fill="#8E9196">· Prioritizing daily wearability</text>

  <rect x="80" y="499" width="490" height="16" rx="0" fill="#1A1410"/>
  <rect x="80" y="495" width="490" height="20" rx="8" fill="#1A1410"/>
  <text x="325" y="509" font-family="Inter, sans-serif" font-size="12" fill="#B89778" text-anchor="middle">Lab saves roughly 40–70% vs equivalent natural</text>

  <!-- Natural side -->
  <rect x="630" y="155" width="490" height="360" rx="8" fill="#131313" stroke="#A3A7AC" stroke-width="1.2"/>
  <rect x="630" y="155" width="490" height="52" rx="8" fill="#1E1E1E"/>
  <rect x="630" y="187" width="490" height="20" fill="#1E1E1E"/>
  <text x="875" y="188" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#A3A7AC" text-anchor="middle">Natural Diamond</text>
  <text x="875" y="208" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="middle">formed over billions of years</text>

  <text x="875" y="248" font-family="'Cormorant Garamond', Georgia, serif" font-size="22" fill="#FFFFFF" text-anchor="middle">Rare, finite, holds sentimental value</text>
  <line x1="660" y1="265" x2="1090" y2="265" stroke="#A3A7AC" stroke-width="0.5" opacity="0.3"/>

  <text x="660" y="296" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#A3A7AC">Advantages</text>
  <text x="660" y="318" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5">· Established resale market</text>
  <text x="660" y="338" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5">· Holds value over decades</text>
  <text x="660" y="358" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5">· Heirloom quality, passes generations</text>
  <text x="660" y="378" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5">· GIA-certified provenance</text>

  <text x="660" y="412" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#8E9196">Consider if</text>
  <text x="660" y="432" font-family="Inter, sans-serif" font-size="13" fill="#8E9196">· Buying as a long-term investment</text>
  <text x="660" y="452" font-family="Inter, sans-serif" font-size="13" fill="#8E9196">· Planning to pass down as heirloom</text>
  <text x="660" y="472" font-family="Inter, sans-serif" font-size="13" fill="#8E9196">· Resale value matters to you</text>

  <rect x="630" y="495" width="490" height="20" rx="8" fill="#1E1E1E"/>
  <text x="875" y="509" font-family="Inter, sans-serif" font-size="12" fill="#A3A7AC" text-anchor="middle">Natural prices are non-linear — size premiums grow fast</text>

  <!-- Footer -->
  <rect x="0" y="570" width="1200" height="30" fill="#0D0B0A"/>
  <line x1="0" y1="570" x2="1200" y2="570" stroke="#B89778" stroke-width="0.8" opacity="0.5"/>
  <text x="600" y="589" font-family="Inter, sans-serif" font-size="11" fill="#8E9196" text-anchor="middle" letter-spacing="1.5">AL-ASALI CUSTOM JEWELRY  ·  alasalicustomjewelry.ca</text>
</svg>
