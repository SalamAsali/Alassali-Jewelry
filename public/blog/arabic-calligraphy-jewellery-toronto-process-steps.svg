<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#B89778" stroke-width="0.1" opacity="0.12"/>
  </pattern>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <!-- Corner brackets -->
  <path d="M 36 80 L 36 36 L 80 36" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>
  <path d="M 1120 36 L 1164 36 L 1164 80" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>
  <path d="M 36 520 L 36 564 L 80 564" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>
  <path d="M 1120 564 L 1164 564 L 1164 520" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>

  <!-- Header -->
  <text x="600" y="88" font-family="'Cormorant Garamond', Georgia, serif" font-size="34" font-weight="700" fill="#FFFFFF" text-anchor="middle">How We Craft Your Arabic Calligraphy Piece</text>
  <text x="600" y="118" font-family="Inter, sans-serif" font-size="13" fill="#8E9196" text-anchor="middle">5 steps · consultation to finished piece · Toronto studio</text>
  <line x1="380" y1="133" x2="820" y2="133" stroke="#B89778" stroke-width="1" opacity="0.5"/>

  <!-- Step connector line -->
  <line x1="116" y1="290" x2="1084" y2="290" stroke="#B89778" stroke-width="1" opacity="0.3" stroke-dasharray="4 4"/>

  <!-- Step 1 -->
  <circle cx="116" cy="290" r="28" fill="#1A1410" stroke="#B89778" stroke-width="2"/>
  <text x="116" y="296" font-family="'Cormorant Garamond', Georgia, serif" font-size="22" font-weight="700" fill="#B89778" text-anchor="middle">1</text>
  <rect x="60" y="330" width="112" height="148" rx="6" fill="#131313" stroke="#B89778" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="116" y="358" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#B89778" text-anchor="middle">Consultation</text>
  <text x="116" y="380" font-family="Inter, sans-serif" font-size="11" fill="#8E9196" text-anchor="middle">Text, font,</text>
  <text x="116" y="396" font-family="Inter, sans-serif" font-size="11" fill="#8E9196" text-anchor="middle">silhouette</text>
  <text x="116" y="418" font-family="Inter, sans-serif" font-size="11" fill="#D4CFC5" text-anchor="middle">Free · virtual</text>
  <text x="116" y="434" font-family="Inter, sans-serif" font-size="11" fill="#D4CFC5" text-anchor="middle">or in-person</text>
  <text x="116" y="458" font-family="Inter, sans-serif" font-size="10" fill="#B89778" text-anchor="middle">~1 day</text>

  <!-- Step 2 -->
  <circle cx="308" cy="290" r="28" fill="#1A1410" stroke="#B89778" stroke-width="2"/>
  <text x="308" y="296" font-family="'Cormorant Garamond', Georgia, serif" font-size="22" font-weight="700" fill="#B89778" text-anchor="middle">2</text>
  <rect x="252" y="330" width="112" height="148" rx="6" fill="#131313" stroke="#B89778" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="308" y="358" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#B89778" text-anchor="middle">Proofread</text>
  <text x="308" y="380" font-family="Inter, sans-serif" font-size="11" fill="#8E9196" text-anchor="middle">Every character</text>
  <text x="308" y="396" font-family="Inter, sans-serif" font-size="11" fill="#8E9196" text-anchor="middle">verified</text>
  <text x="308" y="418" font-family="Inter, sans-serif" font-size="11" fill="#D4CFC5" text-anchor="middle">Authoritative</text>
  <text x="308" y="434" font-family="Inter, sans-serif" font-size="11" fill="#D4CFC5" text-anchor="middle">sources used</text>
  <text x="308" y="458" font-family="Inter, sans-serif" font-size="10" fill="#B89778" text-anchor="middle">Before CAD</text>

  <!-- Step 3 -->
  <circle cx="500" cy="290" r="28" fill="#1A1410" stroke="#B89778" stroke-width="2"/>
  <text x="500" y="296" font-family="'Cormorant Garamond', Georgia, serif" font-size="22" font-weight="700" fill="#B89778" text-anchor="middle">3</text>
  <rect x="444" y="330" width="112" height="148" rx="6" fill="#131313" stroke="#B89778" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="500" y="358" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#B89778" text-anchor="middle">CAD Design</text>
  <text x="500" y="380" font-family="Inter, sans-serif" font-size="11" fill="#8E9196" text-anchor="middle">3D preview of</text>
  <text x="500" y="396" font-family="Inter, sans-serif" font-size="11" fill="#8E9196" text-anchor="middle">your piece</text>
  <text x="500" y="418" font-family="Inter, sans-serif" font-size="11" fill="#D4CFC5" text-anchor="middle">Unlimited</text>
  <text x="500" y="434" font-family="Inter, sans-serif" font-size="11" fill="#D4CFC5" text-anchor="middle">revisions</text>
  <text x="500" y="458" font-family="Inter, sans-serif" font-size="10" fill="#B89778" text-anchor="middle">Until approved</text>

  <!-- Step 4 -->
  <circle cx="700" cy="290" r="28" fill="#1A1410" stroke="#B89778" stroke-width="2"/>
  <text x="700" y="296" font-family="'Cormorant Garamond', Georgia, serif" font-size="22" font-weight="700" fill="#B89778" text-anchor="middle">4</text>
  <rect x="644" y="330" width="112" height="148" rx="6" fill="#131313" stroke="#B89778" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="700" y="358" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#B89778" text-anchor="middle">Casting</text>
  <text x="700" y="380" font-family="Inter, sans-serif" font-size="11" fill="#8E9196" text-anchor="middle">Cast in chosen</text>
  <text x="700" y="396" font-family="Inter, sans-serif" font-size="11" fill="#8E9196" text-anchor="middle">metal · stones</text>
  <text x="700" y="412" font-family="Inter, sans-serif" font-size="11" fill="#8E9196" text-anchor="middle">set by hand</text>
  <text x="700" y="434" font-family="Inter, sans-serif" font-size="11" fill="#D4CFC5" text-anchor="middle">In-studio</text>
  <text x="700" y="450" font-family="Inter, sans-serif" font-size="11" fill="#D4CFC5" text-anchor="middle">Toronto</text>
  <text x="700" y="470" font-family="Inter, sans-serif" font-size="10" fill="#B89778" text-anchor="middle">2–4 weeks</text>

  <!-- Step 5 -->
  <circle cx="900" cy="290" r="28" fill="#1A1410" stroke="#B89778" stroke-width="2"/>
  <text x="900" y="296" font-family="'Cormorant Garamond', Georgia, serif" font-size="22" font-weight="700" fill="#B89778" text-anchor="middle">5</text>
  <rect x="844" y="330" width="112" height="148" rx="6" fill="#221A10" stroke="#B89778" stroke-width="1"/>
  <text x="900" y="358" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#B89778" text-anchor="middle">Inspection</text>
  <text x="900" y="380" font-family="Inter, sans-serif" font-size="11" fill="#8E9196" text-anchor="middle">Mohammad</text>
  <text x="900" y="396" font-family="Inter, sans-serif" font-size="11" fill="#8E9196" text-anchor="middle">personally checks</text>
  <text x="900" y="418" font-family="Inter, sans-serif" font-size="11" fill="#D4CFC5" text-anchor="middle">Every Arabic</text>
  <text x="900" y="434" font-family="Inter, sans-serif" font-size="11" fill="#D4CFC5" text-anchor="middle">piece verified</text>
  <text x="900" y="458" font-family="Inter, sans-serif" font-size="10" fill="#B89778" text-anchor="middle">Before shipping</text>

  <!-- Total time callout -->
  <rect x="1016" y="240" width="148" height="130" rx="8" fill="#1A1410" stroke="#B89778" stroke-width="1.2"/>
  <text x="1090" y="268" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#B89778" text-anchor="middle">TOTAL TIME</text>
  <text x="1090" y="298" font-family="'Cormorant Garamond', Georgia, serif" font-size="28" font-weight="700" fill="#FFFFFF" text-anchor="middle">4–6 wks</text>
  <line x1="1030" y1="310" x2="1150" y2="310" stroke="#B89778" stroke-width="0.5" opacity="0.5"/>
  <text x="1090" y="333" font-family="Inter, sans-serif" font-size="11" fill="#D4CFC5" text-anchor="middle">Simpler pieces</text>
  <text x="1090" y="349" font-family="Inter, sans-serif" font-size="11" fill="#D4CFC5" text-anchor="middle">3–4 weeks</text>
  <text x="1090" y="365" font-family="Inter, sans-serif" font-size="11" fill="#8E9196" text-anchor="middle">Complex text</text>

  <!-- Step indicator above circles -->
  <text x="116" y="248" font-family="Inter, sans-serif" font-size="10" fill="#8E9196" text-anchor="middle">DAY 1</text>
  <text x="308" y="248" font-family="Inter, sans-serif" font-size="10" fill="#8E9196" text-anchor="middle">DAY 1–2</text>
  <text x="500" y="248" font-family="Inter, sans-serif" font-size="10" fill="#8E9196" text-anchor="middle">WEEK 1</text>
  <text x="700" y="248" font-family="Inter, sans-serif" font-size="10" fill="#8E9196" text-anchor="middle">WEEKS 2–5</text>
  <text x="900" y="248" font-family="Inter, sans-serif" font-size="10" fill="#8E9196" text-anchor="middle">FINAL</text>

  <!-- Note -->
  <text x="580" y="530" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="middle">Free consultation · unlimited CAD revisions · in-house Toronto studio · Al-Asali Jewelry 2026</text>

  <!-- Footer -->
  <rect x="0" y="570" width="1200" height="30" fill="#0D0B0A"/>
  <line x1="0" y1="570" x2="1200" y2="570" stroke="#B89778" stroke-width="0.8" opacity="0.5"/>
  <text x="600" y="589" font-family="Inter, sans-serif" font-size="11" fill="#8E9196" text-anchor="middle" letter-spacing="1.5">AL-ASALI CUSTOM JEWELRY  ·  alasalicustomjewelry.ca</text>
</svg>
