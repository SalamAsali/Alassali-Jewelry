  <text x="670" y="244" font-family="Inter, sans-serif" font-size="13" fill="#8E9196">Inclusions visible:</text>
  <text x="960" y="244" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5" text-anchor="middle">Barely under expert loupe</text>

  <line x1="650" y1="254" x2="1100" y2="254" stroke="#2C2C2C" stroke-width="1"/>

  <text x="670" y="282" font-family="Inter, sans-serif" font-size="13" fill="#8E9196">Face-up appearance:</text>
  <text x="960" y="282" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5" text-anchor="middle">Noticeably brighter in direct light</text>

  <line x1="650" y1="292" x2="1100" y2="292" stroke="#2C2C2C" stroke-width="1"/>

  <text x="670" y="320" font-family="Inter, sans-serif" font-size="13" fill="#8E9196">Price vs plain gold:</text>
  <text x="960" y="320" font-family="Inter, sans-serif" font-size="13" fill="#B89778" text-anchor="middle">+60–80%</text>

  <line x1="650" y1="330" x2="1100" y2="330" stroke="#2C2C2C" stroke-width="1"/>

  <text x="670" y="358" font-family="Inter, sans-serif" font-size="13" fill="#8E9196">Top 6 price:</text>
  <text x="960" y="358" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#B89778" text-anchor="middle">$6,500</text>

  <line x1="650" y1="368" x2="1100" y2="368" stroke="#2C2C2C" stroke-width="1"/>

  <text x="670" y="396" font-family="Inter, sans-serif" font-size="13" fill="#8E9196">Full Set (12 teeth):</text>
  <text x="960" y="396" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#B89778" text-anchor="middle">$14,000</text>

  <line x1="650" y1="406" x2="1100" y2="406" stroke="#2C2C2C" stroke-width="1"/>

  <text x="670" y="434" font-family="Inter, sans-serif" font-size="13" fill="#8E9196">Best for:</text>
  <text x="960" y="434" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5" text-anchor="middle">Full iced-out sets</text>

  <line x1="650" y1="444" x2="1100" y2="444" stroke="#2C2C2C" stroke-width="1"/>

  <text x="670" y="472" font-family="Inter, sans-serif" font-size="13" fill="#8E9196">Verdict:</text>
  <rect x="870" y="455" width="170" height="28" rx="14" fill="#B89778" fill-opacity="0.2" stroke="#B89778" stroke-width="1"/>
  <text x="955" y="474" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#B89778" text-anchor="middle">Worth it full set</text>

  <!-- VS divider -->
  <text x="600" y="300" font-family="'Cormorant Garamond', Georgia, serif" font-size="28" fill="#B89778" text-anchor="middle" opacity="0.5">vs</text>

  <!-- Note -->
  <text x="600" y="535" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="middle">VVS costs ~$4,500 more than VS on a full set · Difference subtle on single tooth or top 6 · Source: Al-Asali Jewelry Studio, Toronto 2026</text>

  <!-- Footer -->
  <rect x="0" y="570" width="1200" height="30" fill="#0D0B0A"/>
  <line x1="0" y1="570" x2="1200" y2="570" stroke="#B89778" stroke-width="0.8" opacity="0.5"/>
  <text x="600" y="589" font-family="Inter, sans-serif" font-size="11" fill="#8E9196" text-anchor="middle" letter-spacing="1.5">AL-ASALI CUSTOM JEWELRY  ·  alasalicustomjewelry.ca</text>
