  <rect x="630" y="150" width="490" height="56" rx="8" fill="#221A10"/>
  <rect x="630" y="186" width="490" height="20" fill="#221A10"/>
  <text x="875" y="187" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#B89778" text-anchor="middle">VVS Clarity</text>
  <text x="875" y="205" font-family="Inter, sans-serif" font-size="13" fill="#8E9196" text-anchor="middle">Very, Very Slightly Included</text>

