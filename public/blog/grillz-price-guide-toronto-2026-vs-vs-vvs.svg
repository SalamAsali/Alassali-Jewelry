<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#B89778" stroke-width="0.1" opacity="0.12"/>
  </pattern>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <!-- Corner brackets -->
  <path d="M 36 80 L 36 36 L 80 36" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>
  <path d="M 1120 36 L 1164 36 L 1164 80" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>
  <path d="M 36 520 L 36 564 L 80 564" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>
  <path d="M 1120 564 L 1164 564 L 1164 520" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>

  <!-- Header -->
  <text x="600" y="88" font-family="'Cormorant Garamond', Georgia, serif" font-size="34" font-weight="700" fill="#FFFFFF" text-anchor="middle">Diamond Clarity — VS vs VVS vs Flawless</text>
  <text x="600" y="118" font-family="Inter, sans-serif" font-size="13" fill="#8E9196" text-anchor="middle">which grade is right for your grillz?</text>
  <line x1="380" y1="133" x2="820" y2="133" stroke="#B89778" stroke-width="1" opacity="0.5"/>

  <!-- VS column -->
  <rect x="60" y="155" width="330" height="355" rx="8" fill="#131313" stroke="#B89778" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="225" y="200" font-family="'Cormorant Garamond', Georgia, serif" font-size="32" font-weight="700" fill="#B89778" text-anchor="middle">VS</text>
  <text x="225" y="228" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5" text-anchor="middle">Very Slightly Included</text>
  <line x1="80" y1="244" x2="370" y2="244" stroke="#B89778" stroke-width="0.5" opacity="0.3"/>

  <!-- Sparkle dots - VS -->
  <circle cx="165" cy="278" r="5" fill="#B89778" opacity="0.7"/>
  <circle cx="185" cy="278" r="5" fill="#B89778" opacity="0.7"/>
  <circle cx="205" cy="278" r="5" fill="#B89778" opacity="0.7"/>
  <circle cx="225" cy="278" r="3" fill="#B89778" opacity="0.3"/>
  <circle cx="245" cy="278" r="3" fill="#B89778" opacity="0.3"/>

  <text x="225" y="318" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5" text-anchor="middle">Inclusions invisible</text>
  <text x="225" y="338" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5" text-anchor="middle">to the naked eye</text>
  <text x="225" y="374" font-family="Inter, sans-serif" font-size="13" fill="#8E9196" text-anchor="middle">Excellent sparkle</text>
  <text x="225" y="394" font-family="Inter, sans-serif" font-size="13" fill="#8E9196" text-anchor="middle">for everyday wear</text>
  <text x="225" y="414" font-family="Inter, sans-serif" font-size="13" fill="#8E9196" text-anchor="middle">Best value entry point</text>

  <rect x="80" y="462" width="270" height="32" rx="6" fill="#1A1410" stroke="#B89778" stroke-width="0.8"/>
  <text x="215" y="482" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#B89778" text-anchor="middle">Popular choice</text>

  <!-- VVS column -->
  <rect x="435" y="155" width="330" height="355" rx="8" fill="#1A1410" stroke="#B89778" stroke-width="1.5"/>
  <text x="600" y="200" font-family="'Cormorant Garamond', Georgia, serif" font-size="32" font-weight="700" fill="#B89778" text-anchor="middle">VVS</text>
  <text x="600" y="228" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5" text-anchor="middle">Very Very Slightly Included</text>
  <line x1="455" y1="244" x2="745" y2="244" stroke="#B89778" stroke-width="0.5" opacity="0.3"/>

  <!-- Sparkle dots - VVS (more) -->
  <circle cx="540" cy="278" r="5" fill="#B89778" opacity="0.9"/>
  <circle cx="560" cy="278" r="5" fill="#B89778" opacity="0.9"/>
  <circle cx="580" cy="278" r="5" fill="#B89778" opacity="0.9"/>
  <circle cx="600" cy="278" r="5" fill="#B89778" opacity="0.9"/>
  <circle cx="620" cy="278" r="3" fill="#B89778" opacity="0.5"/>

  <text x="600" y="318" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5" text-anchor="middle">Near-perfect clarity</text>
  <text x="600" y="338" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5" text-anchor="middle">no inclusions visible</text>
  <text x="600" y="374" font-family="Inter, sans-serif" font-size="13" fill="#8E9196" text-anchor="middle">Premium brilliance</text>
  <text x="600" y="394" font-family="Inter, sans-serif" font-size="13" fill="#8E9196" text-anchor="middle">chosen by connoisseurs</text>
  <text x="600" y="414" font-family="Inter, sans-serif" font-size="13" fill="#8E9196" text-anchor="middle">Noticeably more sparkle</text>

  <rect x="455" y="462" width="270" height="32" rx="6" fill="#221A10" stroke="#B89778" stroke-width="1"/>
  <text x="590" y="482" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#B89778" text-anchor="middle">Most requested ★</text>

  <!-- Flawless column -->
  <rect x="810" y="155" width="330" height="355" rx="8" fill="#131313" stroke="#B89778" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="975" y="200" font-family="'Cormorant Garamond', Georgia, serif" font-size="32" font-weight="700" fill="#D4CFC5" text-anchor="middle">FL</text>
  <text x="975" y="228" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5" text-anchor="middle">Flawless</text>
  <line x1="830" y1="244" x2="1120" y2="244" stroke="#B89778" stroke-width="0.5" opacity="0.3"/>

  <!-- Sparkle dots - Flawless (all) -->
  <circle cx="915" cy="278" r="5" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="935" cy="278" r="5" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="955" cy="278" r="5" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="975" cy="278" r="5" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="995" cy="278" r="5" fill="#FFFFFF" opacity="0.9"/>

  <text x="975" y="318" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5" text-anchor="middle">Zero inclusions</text>
  <text x="975" y="338" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5" text-anchor="middle">under 10× magnification</text>
  <text x="975" y="374" font-family="Inter, sans-serif" font-size="13" fill="#8E9196" text-anchor="middle">Ultimate rarity</text>
  <text x="975" y="394" font-family="Inter, sans-serif" font-size="13" fill="#8E9196" text-anchor="middle">reserved for statement pieces</text>
  <text x="975" y="414" font-family="Inter, sans-serif" font-size="13" fill="#8E9196" text-anchor="middle">Unmatched brilliance</text>

  <rect x="830" y="462" width="270" height="32" rx="6" fill="#1A1A1A" stroke="#8E9196" stroke-width="0.8"/>
  <text x="965" y="482" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#D4CFC5" text-anchor="middle">Pinnacle grade</text>

  <!-- Note -->
  <text x="600" y="535" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="middle">All grades pass naked-eye inspection · difference matters most under magnification · ask us what's right for your piece</text>

  <!-- Footer -->
  <rect x="0" y="570" width="1200" height="30" fill="#0D0B0A"/>
  <line x1="0" y1="570" x2="1200" y2="570" stroke="#B89778" stroke-width="0.8" opacity="0.5"/>
  <text x="600" y="589" font-family="Inter, sans-serif" font-size="11" fill="#8E9196" text-anchor="middle" letter-spacing="1.5">AL-ASALI CUSTOM JEWELRY  ·  alasalicustomjewelry.ca</text>
</svg>
