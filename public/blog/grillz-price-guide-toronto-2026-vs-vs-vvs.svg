  <rect x="330" y="455" width="170" height="28" rx="14" fill="#2C2C2C"/>
  <text x="415" y="474" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#D4CFC5" text-anchor="middle">Best value pick</text>

