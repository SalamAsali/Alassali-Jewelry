  <text x="410" y="244" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5" text-anchor="middle">Under 10× loupe only</text>

  <line x1="100" y1="254" x2="550" y2="254" stroke="#2C2C2C" stroke-width="1"/>

