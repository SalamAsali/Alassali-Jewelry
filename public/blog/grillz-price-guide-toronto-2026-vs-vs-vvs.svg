  <text x="410" y="434" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5" text-anchor="middle">Top 6 or single tooth</text>

  <line x1="100" y1="444" x2="550" y2="444" stroke="#2C2C2C" stroke-width="1"/>

