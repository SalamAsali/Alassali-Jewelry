<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#B89778" stroke-width="0.1" opacity="0.12"/>
  </pattern>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <!-- Corner brackets -->
  <path d="M 36 80 L 36 36 L 80 36" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>
  <path d="M 1120 36 L 1164 36 L 1164 80" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>
  <path d="M 36 520 L 36 564 L 80 564" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>
  <path d="M 1120 564 L 1164 564 L 1164 520" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>

  <!-- Header -->
  <text x="600" y="88" font-family="'Cormorant Garamond', Georgia, serif" font-size="34" font-weight="700" fill="#FFFFFF" text-anchor="middle">Lab-Grown vs Natural — The Price Gap</text>
  <text x="600" y="118" font-family="Inter, sans-serif" font-size="13" fill="#8E9196" text-anchor="middle">same 4Cs · same hardness · significant price difference</text>
  <line x1="380" y1="133" x2="820" y2="133" stroke="#B89778" stroke-width="1" opacity="0.5"/>

  <!-- Visual bar comparison by carat (relative, no dollar amounts) -->
  <!-- Labels column -->
  <text x="160" y="185" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#8E9196" text-anchor="middle">CARAT</text>
  <text x="160" y="240" font-family="Inter, sans-serif" font-size="16" fill="#D4CFC5" text-anchor="middle">0.5 ct</text>
  <text x="160" y="300" font-family="Inter, sans-serif" font-size="16" fill="#D4CFC5" text-anchor="middle">1.0 ct ★</text>
  <text x="160" y="360" font-family="Inter, sans-serif" font-size="16" fill="#D4CFC5" text-anchor="middle">1.5 ct</text>
  <text x="160" y="420" font-family="Inter, sans-serif" font-size="16" fill="#D4CFC5" text-anchor="middle">2.0 ct</text>

  <!-- Lab-grown bars (shorter = cheaper) -->
  <text x="280" y="185" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#B89778" text-anchor="middle">LAB-GROWN</text>
  <!-- 0.5ct lab ~$1,800 → ~51% of natural bar width of natural bar 320px → 163px -->
  <rect x="220" y="222" width="163" height="28" rx="4" fill="#B89778" opacity="0.7"/>
  <text x="393" y="241" font-family="Inter, sans-serif" font-size="13" fill="#B89778">~49% less</text>
  <!-- 1.0ct lab ~$2,800 → ~43% of natural bar width (natural 320, lab 137) -->
  <rect x="220" y="282" width="137" height="28" rx="4" fill="#B89778" opacity="0.85"/>
  <text x="367" y="301" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#B89778">~57% less ★</text>
  <!-- 1.5ct lab ~$3,800 → ~36% of natural (natural 320, lab 115) -->
  <rect x="220" y="342" width="115" height="28" rx="4" fill="#B89778" opacity="0.8"/>
  <text x="345" y="361" font-family="Inter, sans-serif" font-size="13" fill="#B89778">~64% less</text>
  <!-- 2.0ct lab ~$5,200 → ~32% of natural (natural 320, lab 102) -->
  <rect x="220" y="402" width="102" height="28" rx="4" fill="#B89778" opacity="0.75"/>
  <text x="332" y="421" font-family="Inter, sans-serif" font-size="13" fill="#B89778">~68% less</text>

  <!-- Natural bars (full width = reference) -->
  <text x="820" y="185" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#A3A7AC" text-anchor="middle">NATURAL</text>
  <rect x="560" y="222" width="320" height="28" rx="4" fill="#A3A7AC" opacity="0.5"/>
  <rect x="560" y="282" width="320" height="28" rx="4" fill="#A3A7AC" opacity="0.6"/>
  <rect x="560" y="342" width="320" height="28" rx="4" fill="#A3A7AC" opacity="0.55"/>
  <rect x="560" y="402" width="320" height="28" rx="4" fill="#A3A7AC" opacity="0.5"/>
  <text x="895" y="241" font-family="Inter, sans-serif" font-size="13" fill="#A3A7AC">reference</text>
  <text x="895" y="301" font-family="Inter, sans-serif" font-size="13" fill="#A3A7AC">reference</text>
  <text x="895" y="361" font-family="Inter, sans-serif" font-size="13" fill="#A3A7AC">reference</text>
  <text x="895" y="421" font-family="Inter, sans-serif" font-size="13" fill="#A3A7AC">reference</text>

  <!-- Legend note -->
  <text x="600" y="468" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="middle">★ Most popular size · bars are proportional to relative price difference · both at G-H, VS clarity</text>

  <!-- Callout box -->
  <rect x="200" y="488" width="800" height="36" rx="6" fill="#1A1410" stroke="#B89778" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="600" y="511" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5" text-anchor="middle">Lab-grown savings grow with carat size — the larger the stone, the bigger the gap · ask us for a custom quote</text>

  <!-- Footer -->
  <rect x="0" y="570" width="1200" height="30" fill="#0D0B0A"/>
  <line x1="0" y1="570" x2="1200" y2="570" stroke="#B89778" stroke-width="0.8" opacity="0.5"/>
  <text x="600" y="589" font-family="Inter, sans-serif" font-size="11" fill="#8E9196" text-anchor="middle" letter-spacing="1.5">AL-ASALI CUSTOM JEWELRY  ·  alasalicustomjewelry.ca</text>
</svg>
