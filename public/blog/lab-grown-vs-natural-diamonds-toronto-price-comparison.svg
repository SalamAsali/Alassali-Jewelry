<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="barNat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A3A7AC"/>
      <stop offset="100%" stop-color="#8E9196"/>
    </linearGradient>
    <linearGradient id="barLab" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8A98A"/>
      <stop offset="100%" stop-color="#B89778"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#B89778" stroke-width="0.1" opacity="0.12"/>
  </pattern>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <!-- Corner brackets -->
  <path d="M 36 80 L 36 36 L 80 36" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>
  <path d="M 1120 36 L 1164 36 L 1164 80" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>
  <path d="M 36 520 L 36 564 L 80 564" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>
  <path d="M 1120 564 L 1164 564 L 1164 520" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>

  <!-- Header -->
  <text x="600" y="88" font-family="'Cormorant Garamond', Georgia, serif" font-size="32" font-weight="700" fill="#FFFFFF" text-anchor="middle">Lab-Grown vs Natural — Price Comparison</text>
  <text x="600" y="118" font-family="Inter, sans-serif" font-size="14" fill="#8E9196" text-anchor="middle">14K Gold Solitaire · G VS1 Clarity · Pre-HST · Toronto 2026</text>
  <line x1="380" y1="133" x2="820" y2="133" stroke="#B89778" stroke-width="1" opacity="0.5"/>

  <!-- Legend -->
  <rect x="340" y="148" width="14" height="14" rx="2" fill="url(#barNat)"/>
  <text x="360" y="160" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5">Natural Diamond</text>
  <rect x="510" y="148" width="14" height="14" rx="2" fill="url(#barLab)"/>
  <text x="530" y="160" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5">Lab-Grown Diamond</text>

  <!-- Chart area: y baseline=460, max bar height=260 (representing $32,000+) -->
  <!-- Using scale: $1 = 260/32000 = 0.008125 px  -->

  <!-- Y grid lines -->
  <line x1="120" y1="200" x2="1080" y2="200" stroke="#2C2C2C" stroke-width="1"/>
  <line x1="120" y1="265" x2="1080" y2="265" stroke="#2C2C2C" stroke-width="1"/>
  <line x1="120" y1="330" x2="1080" y2="330" stroke="#2C2C2C" stroke-width="1"/>
  <line x1="120" y1="395" x2="1080" y2="395" stroke="#2C2C2C" stroke-width="1"/>
  <line x1="120" y1="460" x2="1080" y2="460" stroke="#B89778" stroke-width="0.8" opacity="0.3"/>

  <!-- Y labels -->
  <text x="112" y="204" font-family="Inter, sans-serif" font-size="11" fill="#8E9196" text-anchor="end">$16,000</text>
  <text x="112" y="269" font-family="Inter, sans-serif" font-size="11" fill="#8E9196" text-anchor="end">$12,000</text>
  <text x="112" y="334" font-family="Inter, sans-serif" font-size="11" fill="#8E9196" text-anchor="end">$8,000</text>
  <text x="112" y="399" font-family="Inter, sans-serif" font-size="11" fill="#8E9196" text-anchor="end">$4,000</text>

  <!-- Scale: baseline=460, max=460-260=200 represents $16,000 → 1px = 16000/260 = 61.5 -->
  <!-- Natural 0.5ct: $3,500 → h=3500/61.5=56.9 → y=460-57=403 -->
  <!-- Lab 0.5ct: $1,800 → h=1800/61.5=29.3 → y=460-29=431 -->

  <!-- 0.5ct -->
  <rect x="148" y="403" width="38" height="57" rx="3" fill="url(#barNat)"/>
  <rect x="194" y="431" width="38" height="29" rx="3" fill="url(#barLab)"/>
  <text x="180" y="477" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="middle">0.5ct</text>
  <text x="148" y="399" font-family="Inter, sans-serif" font-size="11" fill="#A3A7AC">$3,500</text>
  <text x="194" y="427" font-family="Inter, sans-serif" font-size="11" fill="#B89778">$1,800</text>

  <!-- 0.75ct: Nat $4,500 h=73.2, Lab $2,200 h=35.8 -->
  <rect x="295" y="387" width="38" height="73" rx="3" fill="url(#barNat)"/>
  <rect x="341" y="424" width="38" height="36" rx="3" fill="url(#barLab)"/>
  <text x="327" y="477" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="middle">0.75ct</text>
  <text x="295" y="383" font-family="Inter, sans-serif" font-size="11" fill="#A3A7AC">$4,500</text>
  <text x="341" y="420" font-family="Inter, sans-serif" font-size="11" fill="#B89778">$2,200</text>

  <!-- 1.0ct: Nat $6,500 h=105.7, Lab $2,800 h=45.5 — highlight -->
  <rect x="442" y="354" width="42" height="106" rx="3" fill="url(#barNat)"/>
  <rect x="492" y="414" width="42" height="46" rx="3" fill="url(#barLab)"/>
  <!-- Highlight bracket -->
  <text x="476" y="477" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">1.0ct ★</text>
  <text x="437" y="350" font-family="Inter, sans-serif" font-size="11" fill="#A3A7AC">$6,500</text>
  <text x="492" y="410" font-family="Inter, sans-serif" font-size="11" fill="#B89778">$2,800</text>
  <!-- savings tag -->
  <rect x="430" y="490" width="100" height="18" rx="9" fill="#1A1410" stroke="#6EBF7E" stroke-width="0.8"/>
  <text x="480" y="503" font-family="Inter, sans-serif" font-size="10" fill="#6EBF7E" text-anchor="middle">save $3,700</text>

  <!-- 1.5ct: Nat $10,500 h=170.7, Lab $3,800 h=61.8 -->
  <rect x="600" y="289" width="38" height="171" rx="3" fill="url(#barNat)"/>
  <rect x="646" y="398" width="38" height="62" rx="3" fill="url(#barLab)"/>
  <text x="622" y="477" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="middle">1.5ct</text>
  <text x="597" y="285" font-family="Inter, sans-serif" font-size="11" fill="#A3A7AC">$10,500</text>
  <text x="646" y="394" font-family="Inter, sans-serif" font-size="11" fill="#B89778">$3,800</text>

  <!-- 2.0ct: Nat $16,500 — capped at chart max, Lab $5,200 h=84.6 -->
  <rect x="750" y="200" width="38" height="260" rx="3" fill="url(#barNat)" opacity="0.8"/>
  <text x="750" y="196" font-family="Inter, sans-serif" font-size="10" fill="#A3A7AC">$16,500+</text>
  <rect x="796" y="376" width="38" height="84" rx="3" fill="url(#barLab)"/>
  <text x="772" y="477" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="middle">2.0ct</text>
  <text x="796" y="372" font-family="Inter, sans-serif" font-size="11" fill="#B89778">$5,200</text>

  <!-- 3.0ct: Nat $32,000+ — overflow indicator, Lab $8,500 h=138.2 -->
  <rect x="900" y="200" width="38" height="260" rx="3" fill="url(#barNat)" opacity="0.6"/>
  <!-- overflow arrow -->
  <polygon points="919,195 926,208 912,208" fill="#A3A7AC" opacity="0.6"/>
  <text x="900" y="193" font-family="Inter, sans-serif" font-size="10" fill="#A3A7AC">$32,000+</text>
  <rect x="946" y="322" width="38" height="138" rx="3" fill="url(#barLab)"/>
  <text x="922" y="477" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="middle">3.0ct</text>
  <text x="946" y="318" font-family="Inter, sans-serif" font-size="11" fill="#B89778">$8,500</text>

  <!-- Savings note -->
  <text x="600" y="530" font-family="Inter, sans-serif" font-size="13" fill="#8E9196" text-anchor="middle">Lab-grown savings grow non-linearly — at 3ct, natural costs nearly 4× more · Source: Al-Asali Jewelry, Toronto 2026</text>

  <!-- Footer -->
  <rect x="0" y="570" width="1200" height="30" fill="#0D0B0A"/>
  <line x1="0" y1="570" x2="1200" y2="570" stroke="#B89778" stroke-width="0.8" opacity="0.5"/>
  <text x="600" y="589" font-family="Inter, sans-serif" font-size="11" fill="#8E9196" text-anchor="middle" letter-spacing="1.5">AL-ASALI CUSTOM JEWELRY  ·  alasalicustomjewelry.ca</text>
</svg>
