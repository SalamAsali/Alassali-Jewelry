  </pattern>
  <rect width="1920" height="1080" fill="url(#grid)"/>

  <!-- Corner brackets — top-left -->
  <path d="M 60 120 L 60 60 L 120 60" fill="none" stroke="#B89778" stroke-width="3" stroke-linecap="square"/>
  <!-- top-right -->
  <path d="M 1800 60 L 1860 60 L 1860 120" fill="none" stroke="#B89778" stroke-width="3" stroke-linecap="square"/>
  <!-- bottom-left -->
  <path d="M 60 960 L 60 1020 L 120 1020" fill="none" stroke="#B89778" stroke-width="3" stroke-linecap="square"/>
  <!-- bottom-right -->
  <path d="M 1800 1020 L 1860 1020 L 1860 960" fill="none" stroke="#B89778" stroke-width="3" stroke-linecap="square"/>

  <!-- Category badge -->
  <rect x="140" y="100" width="220" height="36" rx="18" fill="#B89778" fill-opacity="0.15" stroke="#B89778" stroke-width="1.2"/>
