  <text x="440" y="952" font-family="'Cormorant Garamond', Georgia, serif" font-size="36" font-weight="700" fill="#B89778" text-anchor="middle">$1,800–$15,000+</text>
  <text x="440" y="978" font-family="Inter, sans-serif" font-size="13" fill="#8E9196" text-anchor="middle">typical price range</text>

