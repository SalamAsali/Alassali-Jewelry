  <text x="830" y="838" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">$5,200</text>
  <text x="1160" y="838" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#D4CFC5" text-anchor="middle">$11,500</text>
  <text x="1550" y="828" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#6EBF7E" text-anchor="middle">55% less</text>
