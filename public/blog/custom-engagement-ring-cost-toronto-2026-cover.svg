  <rect x="740" y="910" width="440" height="100" rx="6" fill="#1A1A1A" stroke="#B89778" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="960" y="952" font-family="'Cormorant Garamond', Georgia, serif" font-size="36" font-weight="700" fill="#B89778" text-anchor="middle">4–6 weeks</text>
  <text x="960" y="978" font-family="Inter, sans-serif" font-size="13" fill="#8E9196" text-anchor="middle">production timeline</text>

  <!-- Stat 3 -->
  <rect x="1260" y="910" width="440" height="100" rx="6" fill="#1A1A1A" stroke="#B89778" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="1480" y="952" font-family="'Cormorant Garamond', Georgia, serif" font-size="36" font-weight="700" fill="#B89778" text-anchor="middle">60% lab-grown</text>
  <text x="1480" y="978" font-family="Inter, sans-serif" font-size="13" fill="#8E9196" text-anchor="middle">Toronto client preference 2026</text>

