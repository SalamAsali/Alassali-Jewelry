<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#121010"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <pattern id="dots" width="48" height="48" patternUnits="userSpaceOnUse">
    <circle cx="24" cy="24" r="0.8" fill="#B89778" opacity="0.18"/>
  </pattern>
  <rect width="1920" height="1080" fill="url(#dots)"/>

  <!-- Corner brackets -->
  <path d="M 72 96 L 72 72 L 96 72" fill="none" stroke="#B89778" stroke-width="2" stroke-linecap="square"/>
  <path d="M 1824 72 L 1848 72 L 1848 96" fill="none" stroke="#B89778" stroke-width="2" stroke-linecap="square"/>
  <path d="M 72 984 L 72 1008 L 96 1008" fill="none" stroke="#B89778" stroke-width="2" stroke-linecap="square"/>
  <path d="M 1824 1008 L 1848 1008 L 1848 984" fill="none" stroke="#B89778" stroke-width="2" stroke-linecap="square"/>

  <!-- Category pill -->
  <rect x="810" y="96" width="300" height="38" rx="19" fill="none" stroke="#B89778" stroke-width="1"/>
  <text x="960" y="121" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#B89778" text-anchor="middle" letter-spacing="3">GRILLZ  ·  TORONTO 2026</text>

  <!-- Rose gold accent line -->
  <line x1="840" y1="200" x2="1080" y2="200" stroke="#B89778" stroke-width="1" opacity="0.5"/>

  <!-- Main display text -->
  <text x="960" y="390" font-family="'Cormorant Garamond', Georgia, serif" font-size="96" font-weight="300" fill="#FFFFFF" text-anchor="middle" letter-spacing="-1">Custom</text>
  <text x="960" y="500" font-family="'Cormorant Garamond', Georgia, serif" font-size="96" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="-1">Gold Grillz</text>
  <text x="960" y="596" font-family="'Cormorant Garamond', Georgia, serif" font-size="64" font-weight="300" fill="#B89778" text-anchor="middle" font-style="italic">crafted in Toronto</text>

  <!-- Divider -->
  <line x1="840" y1="655" x2="1080" y2="655" stroke="#B89778" stroke-width="1" opacity="0.5"/>

  <!-- Three key concepts -->
  <text x="480" y="760" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#8E9196" text-anchor="middle" letter-spacing="2">GOLD</text>
  <text x="480" y="800" font-family="'Cormorant Garamond', Georgia, serif" font-size="28" fill="#D4CFC5" text-anchor="middle">10K · 14K · 18K</text>

  <line x1="840" y1="740" x2="840" y2="820" stroke="#B89778" stroke-width="0.8" opacity="0.4"/>

  <text x="960" y="760" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#8E9196" text-anchor="middle" letter-spacing="2">DIAMONDS</text>
  <text x="960" y="800" font-family="'Cormorant Garamond', Georgia, serif" font-size="28" fill="#D4CFC5" text-anchor="middle">VS · VVS · Flawless</text>

  <line x1="1080" y1="740" x2="1080" y2="820" stroke="#B89778" stroke-width="0.8" opacity="0.4"/>

  <text x="1440" y="760" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#8E9196" text-anchor="middle" letter-spacing="2">COVERAGE</text>
  <text x="1440" y="800" font-family="'Cormorant Garamond', Georgia, serif" font-size="28" fill="#D4CFC5" text-anchor="middle">Single Tooth to Full Set</text>

  <!-- Footer -->
  <rect x="0" y="1034" width="1920" height="46" fill="#080808"/>
  <line x1="0" y1="1034" x2="1920" y2="1034" stroke="#B89778" stroke-width="0.8" opacity="0.4"/>
  <text x="960" y="1063" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="middle" letter-spacing="2.5">AL-ASALI CUSTOM JEWELRY  ·  alasalicustomjewelry.ca</text>
</svg>
