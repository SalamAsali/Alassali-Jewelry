<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#B89778" stroke-width="0.1" opacity="0.12"/>
  </pattern>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <!-- Corner brackets -->
  <path d="M 36 80 L 36 36 L 80 36" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>
  <path d="M 1120 36 L 1164 36 L 1164 80" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>
  <path d="M 36 520 L 36 564 L 80 564" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>
  <path d="M 1120 564 L 1164 564 L 1164 520" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>

  <!-- Header -->
  <text x="600" y="88" font-family="'Cormorant Garamond', Georgia, serif" font-size="34" font-weight="700" fill="#FFFFFF" text-anchor="middle">Arabic Script Styles for Jewelry</text>
  <text x="600" y="118" font-family="Inter, sans-serif" font-size="13" fill="#8E9196" text-anchor="middle">choose the style that speaks to your heritage</text>
  <line x1="400" y1="133" x2="800" y2="133" stroke="#B89778" stroke-width="1" opacity="0.5"/>

  <!-- 4 script style cards -->

  <!-- Naskh -->
  <rect x="60" y="155" width="255" height="340" rx="8" fill="#131313" stroke="#B89778" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="187" y="200" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#B89778" text-anchor="middle">Naskh</text>
  <text x="187" y="224" font-family="'Cormorant Garamond', Georgia, serif" font-size="32" fill="#FFFFFF" text-anchor="middle" font-style="italic">نسخ</text>
  <line x1="80" y1="248" x2="295" y2="248" stroke="#B89778" stroke-width="0.5" opacity="0.3"/>
  <text x="187" y="278" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5" text-anchor="middle">Clear &amp; readable</text>
  <text x="187" y="300" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="middle">The most common</text>
  <text x="187" y="318" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="middle">script in Arabic text</text>
  <text x="187" y="352" font-family="Inter, sans-serif" font-size="12" fill="#D4CFC5" text-anchor="middle">Best for: names,</text>
  <text x="187" y="370" font-family="Inter, sans-serif" font-size="12" fill="#D4CFC5" text-anchor="middle">short phrases</text>
  <rect x="80" y="440" width="215" height="32" rx="6" fill="#1A1410" stroke="#B89778" stroke-width="0.8"/>
  <text x="187" y="460" font-family="Inter, sans-serif" font-size="12" fill="#B89778" text-anchor="middle">Most popular choice</text>

  <!-- Thuluth -->
  <rect x="335" y="155" width="255" height="340" rx="8" fill="#1A1410" stroke="#B89778" stroke-width="1.5"/>
  <text x="462" y="200" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#B89778" text-anchor="middle">Thuluth</text>
  <text x="462" y="224" font-family="'Cormorant Garamond', Georgia, serif" font-size="32" fill="#FFFFFF" text-anchor="middle" font-style="italic">ثلث</text>
  <line x1="355" y1="248" x2="570" y2="248" stroke="#B89778" stroke-width="0.5" opacity="0.4"/>
  <text x="462" y="278" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5" text-anchor="middle">Bold &amp; majestic</text>
  <text x="462" y="300" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="middle">Ornate curves and</text>
  <text x="462" y="318" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="middle">dramatic flourishes</text>
  <text x="462" y="352" font-family="Inter, sans-serif" font-size="12" fill="#D4CFC5" text-anchor="middle">Best for: Quran</text>
  <text x="462" y="370" font-family="Inter, sans-serif" font-size="12" fill="#D4CFC5" text-anchor="middle">verses, statements</text>
  <rect x="355" y="440" width="215" height="32" rx="6" fill="#221A10" stroke="#B89778" stroke-width="1"/>
  <text x="462" y="460" font-family="Inter, sans-serif" font-size="12" fill="#B89778" text-anchor="middle">Statement pieces ★</text>

  <!-- Ruq'ah -->
  <rect x="610" y="155" width="255" height="340" rx="8" fill="#131313" stroke="#B89778" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="737" y="200" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#B89778" text-anchor="middle">Ruq'ah</text>
  <text x="737" y="224" font-family="'Cormorant Garamond', Georgia, serif" font-size="32" fill="#FFFFFF" text-anchor="middle" font-style="italic">رقعة</text>
  <line x1="630" y1="248" x2="845" y2="248" stroke="#B89778" stroke-width="0.5" opacity="0.3"/>
  <text x="737" y="278" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5" text-anchor="middle">Compact &amp; modern</text>
  <text x="737" y="300" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="middle">Simplified, uniform</text>
  <text x="737" y="318" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="middle">letterforms</text>
  <text x="737" y="352" font-family="Inter, sans-serif" font-size="12" fill="#D4CFC5" text-anchor="middle">Best for: minimalist</text>
  <text x="737" y="370" font-family="Inter, sans-serif" font-size="12" fill="#D4CFC5" text-anchor="middle">everyday jewelry</text>
  <rect x="630" y="440" width="215" height="32" rx="6" fill="#1A1410" stroke="#B89778" stroke-width="0.8"/>
  <text x="737" y="460" font-family="Inter, sans-serif" font-size="12" fill="#B89778" text-anchor="middle">Clean &amp; wearable</text>

  <!-- Diwani -->
  <rect x="885" y="155" width="255" height="340" rx="8" fill="#131313" stroke="#B89778" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="1012" y="200" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#D4CFC5" text-anchor="middle">Diwani</text>
  <text x="1012" y="224" font-family="'Cormorant Garamond', Georgia, serif" font-size="32" fill="#FFFFFF" text-anchor="middle" font-style="italic">ديواني</text>
  <line x1="905" y1="248" x2="1120" y2="248" stroke="#B89778" stroke-width="0.5" opacity="0.3"/>
  <text x="1012" y="278" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5" text-anchor="middle">Fluid &amp; ornamental</text>
  <text x="1012" y="300" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="middle">Flowing curves, high</text>
  <text x="1012" y="318" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="middle">artistic complexity</text>
  <text x="1012" y="352" font-family="Inter, sans-serif" font-size="12" fill="#D4CFC5" text-anchor="middle">Best for: art pieces,</text>
  <text x="1012" y="370" font-family="Inter, sans-serif" font-size="12" fill="#D4CFC5" text-anchor="middle">bespoke commissions</text>
  <rect x="905" y="440" width="215" height="32" rx="6" fill="#1A1A1A" stroke="#8E9196" stroke-width="0.8"/>
  <text x="1012" y="460" font-family="Inter, sans-serif" font-size="12" fill="#D4CFC5" text-anchor="middle">Rare &amp; artistic</text>

  <!-- Note -->
  <text x="600" y="532" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="middle">All text is proofread by Arabic-speaking staff before CAD · free consultation to choose the right script for your piece</text>

  <!-- Footer -->
  <rect x="0" y="570" width="1200" height="30" fill="#0D0B0A"/>
  <line x1="0" y1="570" x2="1200" y2="570" stroke="#B89778" stroke-width="0.8" opacity="0.5"/>
  <text x="600" y="589" font-family="Inter, sans-serif" font-size="11" fill="#8E9196" text-anchor="middle" letter-spacing="1.5">AL-ASALI CUSTOM JEWELRY  ·  alasalicustomjewelry.ca</text>
</svg>
