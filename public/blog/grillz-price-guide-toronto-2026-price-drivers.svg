<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#B89778" stroke-width="0.1" opacity="0.12"/>
  </pattern>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <!-- Corner brackets -->
  <path d="M 36 80 L 36 36 L 80 36" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>
  <path d="M 1120 36 L 1164 36 L 1164 80" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>
  <path d="M 36 520 L 36 564 L 80 564" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>
  <path d="M 1120 564 L 1164 564 L 1164 520" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>

  <!-- Header -->
  <text x="600" y="88" font-family="'Cormorant Garamond', Georgia, serif" font-size="34" font-weight="700" fill="#FFFFFF" text-anchor="middle">What Determines Your Grillz Price</text>
  <text x="600" y="118" font-family="Inter, sans-serif" font-size="13" fill="#8E9196" text-anchor="middle">four factors that shape every custom quote</text>
  <line x1="400" y1="133" x2="800" y2="133" stroke="#B89778" stroke-width="1" opacity="0.5"/>

  <!-- 4 factor cards in a 2x2 grid -->

  <!-- Factor 1: Metal -->
  <rect x="80" y="155" width="490" height="160" rx="8" fill="#131313" stroke="#B89778" stroke-width="0.8" stroke-opacity="0.4"/>
  <circle cx="116" cy="191" r="20" fill="#1A1410" stroke="#B89778" stroke-width="1.5"/>
  <text x="116" y="196" font-family="'Cormorant Garamond', Georgia, serif" font-size="18" font-weight="700" fill="#B89778" text-anchor="middle">1</text>
  <text x="155" y="188" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#B89778">Metal Karat</text>
  <text x="155" y="210" font-family="Inter, sans-serif" font-size="13" fill="#8E9196">10K · 14K · 18K gold</text>
  <line x1="100" y1="228" x2="550" y2="228" stroke="#B89778" stroke-width="0.5" opacity="0.3"/>
  <text x="100" y="252" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5">Higher karat = richer gold content = higher cost.</text>
  <text x="100" y="272" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5">10K is most durable for everyday wear.</text>
  <text x="100" y="294" font-family="Inter, sans-serif" font-size="12" fill="#8E9196">Available in yellow, white, and rose finishes.</text>

  <!-- Factor 2: Coverage -->
  <rect x="630" y="155" width="490" height="160" rx="8" fill="#131313" stroke="#B89778" stroke-width="0.8" stroke-opacity="0.4"/>
  <circle cx="666" cy="191" r="20" fill="#1A1410" stroke="#B89778" stroke-width="1.5"/>
  <text x="666" y="196" font-family="'Cormorant Garamond', Georgia, serif" font-size="18" font-weight="700" fill="#B89778" text-anchor="middle">2</text>
  <text x="705" y="188" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#B89778">Coverage</text>
  <text x="705" y="210" font-family="Inter, sans-serif" font-size="13" fill="#8E9196">single tooth · 4-tooth · 6-tooth · full set</text>
  <line x1="650" y1="228" x2="1100" y2="228" stroke="#B89778" stroke-width="0.5" opacity="0.3"/>
  <text x="650" y="252" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5">More teeth covered = more gold used = higher price.</text>
  <text x="650" y="272" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5">Single tooth is the entry point.</text>
  <text x="650" y="294" font-family="Inter, sans-serif" font-size="12" fill="#8E9196">Top, bottom, or both — fully customisable.</text>

  <!-- Factor 3: Diamond Grade -->
  <rect x="80" y="335" width="490" height="160" rx="8" fill="#131313" stroke="#B89778" stroke-width="0.8" stroke-opacity="0.4"/>
  <circle cx="116" cy="371" r="20" fill="#1A1410" stroke="#B89778" stroke-width="1.5"/>
  <text x="116" y="376" font-family="'Cormorant Garamond', Georgia, serif" font-size="18" font-weight="700" fill="#B89778" text-anchor="middle">3</text>
  <text x="155" y="368" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#B89778">Diamond Grade</text>
  <text x="155" y="390" font-family="Inter, sans-serif" font-size="13" fill="#8E9196">VS · VVS · Flawless (or no diamonds)</text>
  <line x1="100" y1="408" x2="550" y2="408" stroke="#B89778" stroke-width="0.5" opacity="0.3"/>
  <text x="100" y="432" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5">VS is great value. VVS is premium sparkle.</text>
  <text x="100" y="452" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5">Flawless is the pinnacle of brilliance.</text>
  <text x="100" y="474" font-family="Inter, sans-serif" font-size="12" fill="#8E9196">Plain gold with no stones is also available.</text>

  <!-- Factor 4: Finish & Style -->
  <rect x="630" y="335" width="490" height="160" rx="8" fill="#1A1410" stroke="#B89778" stroke-width="1.2"/>
  <circle cx="666" cy="371" r="20" fill="#221A10" stroke="#B89778" stroke-width="1.5"/>
  <text x="666" y="376" font-family="'Cormorant Garamond', Georgia, serif" font-size="18" font-weight="700" fill="#B89778" text-anchor="middle">4</text>
  <text x="705" y="368" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#B89778">Finish &amp; Style</text>
  <text x="705" y="390" font-family="Inter, sans-serif" font-size="13" fill="#8E9196">solid · open-face · slab · iced-out</text>
  <line x1="650" y1="408" x2="1100" y2="408" stroke="#B89778" stroke-width="0.5" opacity="0.3"/>
  <text x="650" y="432" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5">Open-face shows your natural tooth — modern look.</text>
  <text x="650" y="452" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5">Iced-out maximises diamond surface coverage.</text>
  <text x="650" y="474" font-family="Inter, sans-serif" font-size="12" fill="#8E9196">Every style is crafted to your dental impression.</text>

  <!-- Footer -->
  <rect x="0" y="570" width="1200" height="30" fill="#0D0B0A"/>
  <line x1="0" y1="570" x2="1200" y2="570" stroke="#B89778" stroke-width="0.8" opacity="0.5"/>
  <text x="600" y="589" font-family="Inter, sans-serif" font-size="11" fill="#8E9196" text-anchor="middle" letter-spacing="1.5">AL-ASALI CUSTOM JEWELRY  ·  alasalicustomjewelry.ca</text>
</svg>
