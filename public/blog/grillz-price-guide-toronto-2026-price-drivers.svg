<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#B89778" stroke-width="0.1" opacity="0.12"/>
  </pattern>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <!-- Corner brackets -->
  <path d="M 36 80 L 36 36 L 80 36" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>
  <path d="M 1120 36 L 1164 36 L 1164 80" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>
  <path d="M 36 520 L 36 564 L 80 564" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>
  <path d="M 1120 564 L 1164 564 L 1164 520" fill="none" stroke="#B89778" stroke-width="2.5" stroke-linecap="square"/>

  <!-- Header -->
  <text x="600" y="88" font-family="'Cormorant Garamond', Georgia, serif" font-size="32" font-weight="700" fill="#FFFFFF" text-anchor="middle">What Drives Grillz Pricing</text>
  <text x="600" y="118" font-family="Inter, sans-serif" font-size="14" fill="#8E9196" text-anchor="middle">Three variables determine your final cost — Toronto 2026</text>
  <line x1="400" y1="133" x2="800" y2="133" stroke="#B89778" stroke-width="1" opacity="0.5"/>

  <!-- Driver 1: Gold Weight -->
  <rect x="60" y="155" width="340" height="360" rx="8" fill="#131313" stroke="#B89778" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Number indicator -->
  <circle cx="130" cy="195" r="24" fill="#B89778" fill-opacity="0.15" stroke="#B89778" stroke-width="1.5"/>
  <text x="130" y="202" font-family="'Cormorant Garamond', Georgia, serif" font-size="24" font-weight="700" fill="#B89778" text-anchor="middle">01</text>
  <text x="230" y="192" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">Gold Weight &amp; Karat</text>
  <text x="230" y="212" font-family="Inter, sans-serif" font-size="13" fill="#8E9196" text-anchor="middle">per tooth, solid gold</text>
  <line x1="80" y1="225" x2="380" y2="225" stroke="#B89778" stroke-width="0.5" opacity="0.3"/>
  <!-- Content -->
  <text x="230" y="258" font-family="Inter, sans-serif" font-size="13" fill="#D4CFC5" text-anchor="middle">3–5 grams per tooth</text>
  <!-- Weight diagram - simple bars -->
  <text x="100" y="295" font-family="Inter, sans-serif" font-size="12" fill="#8E9196">10K</text>
  <rect x="130" y="283" width="180" height="18" rx="3" fill="#7A6655"/>
  <text x="320" y="295" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Base price</text>

  <text x="100" y="328" font-family="Inter, sans-serif" font-size="12" fill="#8E9196">14K</text>
  <rect x="130" y="316" width="210" height="18" rx="3" fill="#9A8070"/>
  <text x="350" y="328" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">+20%</text>

  <text x="100" y="361" font-family="Inter, sans-serif" font-size="12" fill="#8E9196">18K</text>
  <rect x="130" y="349" width="230" height="18" rx="3" fill="#B89778"/>
  <text x="370" y="361" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">+40%</text>

  <text x="230" y="408" font-family="Inter, sans-serif" font-size="13" fill="#8E9196" text-anchor="middle">Spot gold rate fluctuates</text>
  <text x="230" y="426" font-family="Inter, sans-serif" font-size="13" fill="#8E9196" text-anchor="middle">— all quotes locked at order</text>

  <!-- Driver 2: Diamond Clarity -->
  <rect x="430" y="155" width="340" height="360" rx="8" fill="#131313" stroke="#B89778" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="500" cy="195" r="24" fill="#B89778" fill-opacity="0.15" stroke="#B89778" stroke-width="1.5"/>
  <text x="500" y="202" font-family="'Cormorant Garamond', Georgia, serif" font-size="24" font-weight="700" fill="#B89778" text-anchor="middle">02</text>
  <text x="600" y="192" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">Diamond Clarity</text>
  <text x="600" y="212" font-family="Inter, sans-serif" font-size="13" fill="#8E9196" text-anchor="middle">price premium tiers</text>
  <line x1="450" y1="225" x2="750" y2="225" stroke="#B89778" stroke-width="0.5" opacity="0.3"/>

  <!-- Clarity tiers -->
  <text x="470" y="260" font-family="Inter, sans-serif" font-size="13" fill="#8E9196">Plain gold</text>
  <rect x="560" y="248" width="100" height="20" rx="3" fill="#2C2C2C"/>
  <text x="610" y="263" font-family="Inter, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle">baseline</text>

  <text x="470" y="298" font-family="Inter, sans-serif" font-size="13" fill="#8E9196">SI clarity</text>
  <rect x="560" y="286" width="115" height="20" rx="3" fill="#4A3D30"/>
  <text x="617" y="301" font-family="Inter, sans-serif" font-size="12" fill="#D4CFC5" text-anchor="middle">+10–15%</text>

  <text x="470" y="336" font-family="Inter, sans-serif" font-size="13" fill="#8E9196">VS clarity</text>
  <rect x="560" y="324" width="145" height="20" rx="3" fill="#7A5C3A"/>
  <text x="632" y="339" font-family="Inter, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle">+30–40%</text>

  <text x="470" y="374" font-family="Inter, sans-serif" font-size="13" fill="#8E9196">VVS clarity</text>
  <rect x="560" y="362" width="170" height="20" rx="3" fill="#B89778"/>
  <text x="645" y="377" font-family="Inter, sans-serif" font-size="12" fill="#0A0A0A" font-weight="700" text-anchor="middle">+60–80%</text>

  <text x="470" y="412" font-family="Inter, sans-serif" font-size="13" fill="#8E9196">Flawless</text>
  <rect x="560" y="400" width="200" height="20" rx="3" fill="#D4A87A"/>
  <text x="660" y="415" font-family="Inter, sans-serif" font-size="12" fill="#0A0A0A" font-weight="700" text-anchor="middle">+120%+</text>

  <text x="600" y="465" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="middle">No CZ or moissanite — real diamonds only</text>

  <!-- Driver 3: Coverage -->
  <rect x="800" y="155" width="340" height="360" rx="8" fill="#131313" stroke="#B89778" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="870" cy="195" r="24" fill="#B89778" fill-opacity="0.15" stroke="#B89778" stroke-width="1.5"/>
  <text x="870" y="202" font-family="'Cormorant Garamond', Georgia, serif" font-size="24" font-weight="700" fill="#B89778" text-anchor="middle">03</text>
  <text x="970" y="192" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">Coverage &amp; Style</text>
  <text x="970" y="212" font-family="Inter, sans-serif" font-size="13" fill="#8E9196" text-anchor="middle">face type and teeth count</text>
  <line x1="820" y1="225" x2="1120" y2="225" stroke="#B89778" stroke-width="0.5" opacity="0.3"/>

  <!-- Coverage types -->
  <rect x="830" y="240" width="280" height="60" rx="5" fill="#1A1A1A" stroke="#2C2C2C" stroke-width="1"/>
  <text x="970" y="266" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#D4CFC5" text-anchor="middle">Open Face</text>
  <text x="970" y="286" font-family="Inter, sans-serif" font-size="13" fill="#8E9196" text-anchor="middle">Gold frame, teeth visible behind</text>

  <rect x="830" y="315" width="280" height="60" rx="5" fill="#1A1A1A" stroke="#B89778" stroke-width="1" stroke-opacity="0.5"/>
  <text x="970" y="341" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#B89778" text-anchor="middle">Closed Face</text>
  <text x="970" y="361" font-family="Inter, sans-serif" font-size="13" fill="#8E9196" text-anchor="middle">Full gold coverage — premium</text>

  <rect x="830" y="390" width="280" height="60" rx="5" fill="#221A10" stroke="#B89778" stroke-width="1"/>
  <text x="970" y="416" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle">Iced Out (Full Pavé)</text>
  <text x="970" y="436" font-family="Inter, sans-serif" font-size="13" fill="#8E9196" text-anchor="middle">Diamond set front to back</text>

  <text x="970" y="475" font-family="Inter, sans-serif" font-size="13" fill="#8E9196" text-anchor="middle">More teeth = more gold = higher cost</text>

  <!-- Note -->
  <text x="600" y="535" font-family="Inter, sans-serif" font-size="12" fill="#8E9196" text-anchor="middle">Source: Al-Asali Jewelry Studio, Toronto · Real numbers from active 2026 pricing sheet</text>

  <!-- Footer -->
  <rect x="0" y="570" width="1200" height="30" fill="#0D0B0A"/>
  <line x1="0" y1="570" x2="1200" y2="570" stroke="#B89778" stroke-width="0.8" opacity="0.5"/>
  <text x="600" y="589" font-family="Inter, sans-serif" font-size="11" fill="#8E9196" text-anchor="middle" letter-spacing="1.5">AL-ASALI CUSTOM JEWELRY  ·  alasalicustomjewelry.ca</text>
</svg>
