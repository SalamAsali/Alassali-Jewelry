<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140" role="img" aria-label="Al-Asali Jewelry Studio" preserveAspectRatio="xMidYMid meet">
  <g fill="#FFFFFF">
    <!-- "AL" — ends flush at x=155 -->
    <text x="155" y="70" font-family="'Cinzel', 'Playfair Display', 'Times New Roman', serif" font-weight="700" font-size="58" letter-spacing="4" text-anchor="end">AL</text>

    <!-- Diamond / gem accent in the middle -->
    <g transform="translate(200, 54)" fill="none" stroke="#FFFFFF">
      <!-- Kite silhouette, filled subtly -->
      <path d="M 0,-26 L 22,-4 L 0,26 L -22,-4 Z" stroke-width="1.6" fill="#FFFFFF" fill-opacity="0.14" stroke-linejoin="round"/>
      <!-- Table line -->
      <path d="M -22,-4 L 22,-4" stroke-width="1.3" opacity="0.85"/>
      <!-- Upper crown facets -->
      <path d="M -12,-4 L 0,-26 L 12,-4" stroke-width="1" opacity="0.7" stroke-linejoin="round"/>
      <!-- Pavilion facet hint -->
      <path d="M -14,-4 L 0,26 L 14,-4" stroke-width="0.8" opacity="0.45" stroke-linejoin="round"/>
    </g>

    <!-- "ASALI" — starts at x=245 -->
    <text x="245" y="70" font-family="'Cinzel', 'Playfair Display', 'Times New Roman', serif" font-weight="700" font-size="58" letter-spacing="4">ASALI</text>

    <!-- "Jewelry Studio" italic centred below -->
    <text x="200" y="115" font-family="'Playfair Display', 'Cormorant Garamond', 'Times New Roman', serif" font-weight="500" font-style="italic" font-size="24" letter-spacing="1" text-anchor="middle">Jewelry Studio</text>
  </g>
</svg>
