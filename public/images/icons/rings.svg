<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#1a1a1a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
  <!-- Outer ring band (3/4 perspective) -->
  <path d="M16 42 Q16 54 32 54 Q48 54 48 42" />
  <!-- Inner lower band edge -->
  <path d="M20 44 Q22 51 32 51 Q42 51 44 44" stroke-width="1" opacity="0.5"/>
  <!-- Shoulders rising to signet plate -->
  <path d="M16 42 Q15 36 20 30" />
  <path d="M48 42 Q49 36 44 30" />
  <!-- Signet plate - oval cushion shape -->
  <path d="M20 30 Q20 16 32 14 Q44 16 44 30 Q44 34 32 36 Q20 34 20 30 Z" fill="#1a1a1a" opacity="0.08"/>
  <!-- Inner bevel rim -->
  <path d="M23 28 Q23 19 32 17 Q41 19 41 28 Q41 31 32 33 Q23 31 23 28 Z" stroke-width="1" opacity="0.6"/>
  <!-- Monogram 'A' engraving -->
  <path d="M28 28 L32 18 L36 28" stroke-width="1.4"/>
  <line x1="29.5" y1="24" x2="34.5" y2="24" stroke-width="1.2"/>
  <!-- Decorative corner dots -->
  <circle cx="25" cy="20" r="0.8" fill="#1a1a1a" opacity="0.6"/>
  <circle cx="39" cy="20" r="0.8" fill="#1a1a1a" opacity="0.6"/>
  <circle cx="25" cy="30" r="0.8" fill="#1a1a1a" opacity="0.6"/>
  <circle cx="39" cy="30" r="0.8" fill="#1a1a1a" opacity="0.6"/>
  <!-- Band highlight -->
  <path d="M18 42 Q18 40 20 38" stroke-width="1" opacity="0.5"/>
  <path d="M46 42 Q46 40 44 38" stroke-width="1" opacity="0.5"/>
  <!-- Subtle shadow under band -->
  <path d="M22 50 Q32 52 42 50" stroke-width="1" opacity="0.3"/>
  <!-- Sparkle -->
  <g stroke-width="1" opacity="0.6">
    <line x1="52" y1="12" x2="52" y2="8" />
    <line x1="50" y1="10" x2="54" y2="10" />
  </g>
</svg>
