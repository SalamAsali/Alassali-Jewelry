<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Signet ring band -->
  <ellipse cx="32" cy="40" rx="15" ry="11" />
  <!-- Signet plate top -->
  <rect x="23" y="22" width="18" height="14" rx="3" fill="#1a1a1a" opacity="0.06" stroke="#1a1a1a"/>
  <!-- Decorative engraving on plate -->
  <circle cx="32" cy="29" r="4" />
  <circle cx="32" cy="29" r="1.5" fill="#1a1a1a" opacity="0.15"/>
  <!-- Side detail lines connecting plate to band -->
  <line x1="24" y1="36" x2="23" y2="33" />
  <line x1="40" y1="36" x2="41" y2="33" />
  <!-- Small accent dots -->
  <circle cx="28" cy="25" r="0.8" fill="#1a1a1a"/>
  <circle cx="36" cy="25" r="0.8" fill="#1a1a1a"/>
  <circle cx="28" cy="33" r="0.8" fill="#1a1a1a"/>
  <circle cx="36" cy="33" r="0.8" fill="#1a1a1a"/>
</svg>