<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Back ring (slightly behind) -->
  <ellipse cx="36" cy="36" rx="14" ry="10" fill="#1a1a1a" opacity="0.04"/>
  <!-- Front ring (overlapping) -->
  <ellipse cx="28" cy="34" rx="14" ry="10" fill="#1a1a1a" opacity="0.04"/>
  <!-- Band detail on front ring -->
  <path d="M18 28 Q22 24 28 24 Q34 24 38 28" />
  <path d="M19 29 Q23 25.5 28 25.5 Q33 25.5 37 29" stroke-width="1" opacity="0.4"/>
  <!-- Band detail on back ring -->
  <path d="M26 30 Q30 26 36 26 Q42 26 46 30" />
  <path d="M27 31 Q31 27.5 36 27.5 Q41 27.5 45 31" stroke-width="1" opacity="0.4"/>
  <!-- Small gems on front band -->
  <circle cx="24" cy="25.5" r="1.2" fill="#1a1a1a" opacity="0.15"/>
  <circle cx="28" cy="24.5" r="1.5" fill="#1a1a1a" opacity="0.2"/>
  <circle cx="32" cy="25.5" r="1.2" fill="#1a1a1a" opacity="0.15"/>
  <!-- Heart between rings -->
  <path d="M32 16 Q34 12 37 14 Q38 16 32 22 Q26 16 27 14 Q30 12 32 16 Z" fill="#1a1a1a" opacity="0.08" stroke="#1a1a1a"/>
  <!-- Sparkle -->
  <line x1="44" y1="14" x2="44" y2="10" />
  <line x1="42" y1="12" x2="46" y2="12" />
</svg>