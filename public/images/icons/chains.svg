<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#1a1a1a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
  <!-- Clasp at top -->
  <rect x="29" y="6" width="6" height="4" rx="1" fill="#1a1a1a" opacity="0.1"/>
  <rect x="29" y="6" width="6" height="4" rx="1" stroke-width="1.2"/>
  <circle cx="32" cy="8" r="0.8" fill="#1a1a1a" opacity="0.5"/>
  <!-- Curved chain draping - cuban link style -->
  <!-- Left side descending links -->
  <g stroke-width="1.4">
    <ellipse cx="26" cy="12" rx="3.5" ry="2.2" transform="rotate(-25 26 12)"/>
    <ellipse cx="21" cy="17" rx="3.5" ry="2.2" transform="rotate(-40 21 17)" fill="#1a1a1a" fill-opacity="0.06"/>
    <ellipse cx="17" cy="23" rx="3.5" ry="2.2" transform="rotate(-55 17 23)"/>
    <ellipse cx="14" cy="30" rx="3.5" ry="2.2" transform="rotate(-70 14 30)" fill="#1a1a1a" fill-opacity="0.06"/>
    <ellipse cx="13" cy="37" rx="3.5" ry="2.2" transform="rotate(-85 13 37)"/>
    <ellipse cx="15" cy="44" rx="3.5" ry="2.2" transform="rotate(-100 15 44)" fill="#1a1a1a" fill-opacity="0.06"/>
    <ellipse cx="20" cy="50" rx="3.5" ry="2.2" transform="rotate(-115 20 50)"/>
  </g>
  <!-- Right side descending links -->
  <g stroke-width="1.4">
    <ellipse cx="38" cy="12" rx="3.5" ry="2.2" transform="rotate(25 38 12)"/>
    <ellipse cx="43" cy="17" rx="3.5" ry="2.2" transform="rotate(40 43 17)" fill="#1a1a1a" fill-opacity="0.06"/>
    <ellipse cx="47" cy="23" rx="3.5" ry="2.2" transform="rotate(55 47 23)"/>
    <ellipse cx="50" cy="30" rx="3.5" ry="2.2" transform="rotate(70 50 30)" fill="#1a1a1a" fill-opacity="0.06"/>
    <ellipse cx="51" cy="37" rx="3.5" ry="2.2" transform="rotate(85 51 37)"/>
    <ellipse cx="49" cy="44" rx="3.5" ry="2.2" transform="rotate(100 49 44)" fill="#1a1a1a" fill-opacity="0.06"/>
    <ellipse cx="44" cy="50" rx="3.5" ry="2.2" transform="rotate(115 44 50)"/>
  </g>
  <!-- Center bottom link -->
  <ellipse cx="32" cy="54" rx="3.5" ry="2.2" stroke-width="1.4" fill="#1a1a1a" fill-opacity="0.06"/>
  <!-- Link highlight dots (center of each link) -->
  <circle cx="13" cy="37" r="0.6" fill="#1a1a1a" opacity="0.4"/>
  <circle cx="51" cy="37" r="0.6" fill="#1a1a1a" opacity="0.4"/>
  <circle cx="32" cy="54" r="0.6" fill="#1a1a1a" opacity="0.4"/>
  <!-- Sparkle top left -->
  <g stroke-width="1" opacity="0.6">
    <line x1="7" y1="11" x2="7" y2="7" />
    <line x1="5" y1="9" x2="9" y2="9" />
  </g>
  <!-- Sparkle top right -->
  <g stroke-width="1" opacity="0.5">
    <line x1="57" y1="11" x2="57" y2="7" />
    <line x1="55" y1="9" x2="59" y2="9" />
  </g>
</svg>
