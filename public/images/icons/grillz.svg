<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#1a1a1a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
  <!-- Smile arc (subtle upper guide) -->
  <path d="M10 20 Q32 12 54 20" stroke-width="1.2" opacity="0.4"/>
  <!-- Gum line / mounting bar -->
  <path d="M10 26 Q32 22 54 26" stroke-width="1.4"/>

  <!-- Row of 6 symmetric teeth -->
  <!-- Tooth 1 -->
  <path d="M11.5 28 L12 40 Q13 43 14.5 43 Q16 43 17 40 L17.5 28 Z" fill="#1a1a1a" opacity="0.08"/>
  <path d="M11.5 28 L12 40 Q13 43 14.5 43 Q16 43 17 40 L17.5 28"/>
  <!-- Tooth 2 -->
  <path d="M18.5 27 L19 41.5 Q20 44.5 21.5 44.5 Q23 44.5 24 41.5 L24.5 27 Z" fill="#1a1a1a" opacity="0.08"/>
  <path d="M18.5 27 L19 41.5 Q20 44.5 21.5 44.5 Q23 44.5 24 41.5 L24.5 27"/>
  <!-- Tooth 3 (centre left) -->
  <path d="M25.5 26 L26 44 Q27 47 28.5 47 Q30 47 31 44 L31.5 26 Z" fill="#1a1a1a" opacity="0.1"/>
  <path d="M25.5 26 L26 44 Q27 47 28.5 47 Q30 47 31 44 L31.5 26"/>
  <!-- Tooth 4 (centre right) -->
  <path d="M32.5 26 L33 44 Q34 47 35.5 47 Q37 47 38 44 L38.5 26 Z" fill="#1a1a1a" opacity="0.1"/>
  <path d="M32.5 26 L33 44 Q34 47 35.5 47 Q37 47 38 44 L38.5 26"/>
  <!-- Tooth 5 -->
  <path d="M39.5 27 L40 41.5 Q41 44.5 42.5 44.5 Q44 44.5 45 41.5 L45.5 27 Z" fill="#1a1a1a" opacity="0.08"/>
  <path d="M39.5 27 L40 41.5 Q41 44.5 42.5 44.5 Q44 44.5 45 41.5 L45.5 27"/>
  <!-- Tooth 6 -->
  <path d="M46.5 28 L47 40 Q48 43 49.5 43 Q51 43 52 40 L52.5 28 Z" fill="#1a1a1a" opacity="0.08"/>
  <path d="M46.5 28 L47 40 Q48 43 49.5 43 Q51 43 52 40 L52.5 28"/>

  <!-- Metallic highlight across top of teeth -->
  <path d="M13 30 Q32 28 51 30" stroke-width="0.7" opacity="0.4"/>

  <!-- Iced-out pavé dots, one per tooth -->
  <circle cx="14.5" cy="35" r="1.1" fill="#1a1a1a" opacity="0.5"/>
  <circle cx="21.5" cy="35" r="1.2" fill="#1a1a1a" opacity="0.5"/>
  <circle cx="28.5" cy="35" r="1.4" fill="#1a1a1a" opacity="0.55"/>
  <circle cx="35.5" cy="35" r="1.4" fill="#1a1a1a" opacity="0.55"/>
  <circle cx="42.5" cy="35" r="1.2" fill="#1a1a1a" opacity="0.5"/>
  <circle cx="49.5" cy="35" r="1.1" fill="#1a1a1a" opacity="0.5"/>

  <!-- Sparkle top left -->
  <g stroke-width="1.2" opacity="0.6">
    <line x1="8" y1="10" x2="8" y2="6"/>
    <line x1="5.5" y1="8" x2="10.5" y2="8"/>
  </g>
  <!-- Sparkle top right -->
  <g stroke-width="1.2" opacity="0.6">
    <line x1="56" y1="10" x2="56" y2="6"/>
    <line x1="53.5" y1="8" x2="58.5" y2="8"/>
  </g>
</svg>
