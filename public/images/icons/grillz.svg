<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#1a1a1a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
  <!-- Upper lip (subtle guide) -->
  <path d="M6 18 Q18 12 32 16 Q46 12 58 18" stroke-width="1.2" opacity="0.6"/>
  <!-- Gum line / mounting bar -->
  <path d="M8 22 Q20 18 32 20 Q44 18 56 22" stroke-width="1.4"/>
  <!-- Gum shadow fill -->
  <path d="M8 22 Q20 18 32 20 Q44 18 56 22 L56 25 Q44 22 32 24 Q20 22 8 25 Z" fill="#1a1a1a" opacity="0.06"/>
  <!-- TEETH ROW - individual grillz caps with detailed shape -->
  <!-- Tooth 1 (far left molar) -->
  <path d="M10 24 L11 40 Q12 43 14 43 Q16 43 17 40 L16 24 Z" fill="#1a1a1a" opacity="0.08"/>
  <path d="M10 24 L11 40 Q12 43 14 43 Q16 43 17 40 L16 24" stroke-width="1.3"/>
  <line x1="13.5" y1="26" x2="13.5" y2="38" stroke-width="0.7" opacity="0.4"/>
  <!-- Tooth 2 -->
  <path d="M17 24 L17 42 Q18 45 20 45 Q22 45 23 42 L23 24 Z" fill="#1a1a1a" opacity="0.08"/>
  <path d="M17 24 L17 42 Q18 45 20 45 Q22 45 23 42 L23 24" stroke-width="1.3"/>
  <circle cx="20" cy="35" r="1" fill="#1a1a1a" opacity="0.3"/>
  <!-- Tooth 3 -->
  <path d="M23 24 L23 44 Q24 47 26 47 Q28 47 29 44 L29 24 Z" fill="#1a1a1a" opacity="0.1"/>
  <path d="M23 24 L23 44 Q24 47 26 47 Q28 47 29 44 L29 24" stroke-width="1.3"/>
  <line x1="26" y1="26" x2="26" y2="42" stroke-width="0.7" opacity="0.4"/>
  <!-- Tooth 4 (center left - canine/fang) -->
  <path d="M29 24 L29 46 Q30 50 32 50 Q32.5 50 32.5 50 L32.5 24 Z" fill="#1a1a1a" opacity="0.12"/>
  <path d="M29 24 L29 46 Q30 50 32 50 Q32.5 50 32.5 50 L32.5 24" stroke-width="1.3"/>
  <!-- Diamond on front tooth -->
  <polygon points="31,32 32.5,34 31,36 29.5,34" fill="#1a1a1a" opacity="0.5"/>
  <!-- Tooth 5 (center right - canine/fang) -->
  <path d="M32.5 24 L32.5 50 Q33.5 50 34 50 Q36 50 36 46 L35 24 Z" fill="#1a1a1a" opacity="0.12"/>
  <path d="M32.5 24 L32.5 50 Q33.5 50 34 50 Q36 50 36 46 L35 24" stroke-width="1.3"/>
  <!-- Diamond on front tooth -->
  <polygon points="34,32 35.5,34 34,36 32.5,34" fill="#1a1a1a" opacity="0.5"/>
  <!-- Tooth 6 -->
  <path d="M35 24 L35 44 Q36 47 38 47 Q40 47 41 44 L41 24 Z" fill="#1a1a1a" opacity="0.1"/>
  <path d="M35 24 L35 44 Q36 47 38 47 Q40 47 41 44 L41 24" stroke-width="1.3"/>
  <line x1="38" y1="26" x2="38" y2="42" stroke-width="0.7" opacity="0.4"/>
  <!-- Tooth 7 -->
  <path d="M41 24 L41 42 Q42 45 44 45 Q46 45 47 42 L47 24 Z" fill="#1a1a1a" opacity="0.08"/>
  <path d="M41 24 L41 42 Q42 45 44 45 Q46 45 47 42 L47 24" stroke-width="1.3"/>
  <circle cx="44" cy="35" r="1" fill="#1a1a1a" opacity="0.3"/>
  <!-- Tooth 8 (far right molar) -->
  <path d="M48 24 L47 40 Q48 43 50 43 Q52 43 53 40 L54 24 Z" fill="#1a1a1a" opacity="0.08"/>
  <path d="M48 24 L47 40 Q48 43 50 43 Q52 43 53 40 L54 24" stroke-width="1.3"/>
  <line x1="50.5" y1="26" x2="50.5" y2="38" stroke-width="0.7" opacity="0.4"/>
  <!-- Metallic highlight line across teeth top -->
  <path d="M10 27 Q20 25 32 26 Q44 25 54 27" stroke-width="0.8" opacity="0.4"/>
  <!-- Sparkle top right -->
  <g stroke-width="1" opacity="0.7">
    <line x1="52" y1="12" x2="52" y2="8" />
    <line x1="50" y1="10" x2="54" y2="10" />
  </g>
  <!-- Sparkle top left -->
  <g stroke-width="1" opacity="0.5">
    <line x1="12" y1="12" x2="12" y2="9" />
    <line x1="10.5" y1="10.5" x2="13.5" y2="10.5" />
  </g>
</svg>
