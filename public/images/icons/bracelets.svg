  <circle cx="32" cy="20" r="2.5" fill="#1a1a1a" opacity="0.12" stroke="#1a1a1a"/>
  <circle cx="42" cy="22" r="2" fill="#1a1a1a" opacity="0.08" stroke="#1a1a1a"/>
  <!-- Small accent stones -->
  <circle cx="27" cy="20.5" r="1" fill="#1a1a1a" opacity="0.15"/>
  <circle cx="37" cy="20.5" r="1" fill="#1a1a1a" opacity="0.15"/>
  <!-- Sparkle -->
  <line x1="48" y1="14" x2="48" y2="10" />
  <line x1="46" y1="12" x2="50" y2="12" />
</svg>