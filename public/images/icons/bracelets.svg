<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#1a1a1a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
  <!-- Tennis bracelet - upper arc (back side) -->
  <path d="M6 36 Q6 20 32 14 Q58 20 58 36" stroke-width="1.4"/>
  <!-- Lower arc (front/worn side) -->
  <path d="M6 36 Q6 48 32 54 Q58 48 58 36" stroke-width="1.4"/>
  <!-- Inner rim for depth on lower arc -->
  <path d="M9 37 Q9 46 32 51 Q55 46 55 37" stroke-width="1" opacity="0.4"/>
  <!-- Row of diamond settings across front -->
  <g>
    <rect x="11" y="38" width="6" height="6" rx="1" fill="#1a1a1a" opacity="0.1"/>
    <rect x="11" y="38" width="6" height="6" rx="1" stroke-width="1.2"/>
    <polygon points="14,39 16,41 14,43 12,41" fill="#1a1a1a" opacity="0.3"/>
  </g>
  <g>
    <rect x="19" y="42" width="6" height="6" rx="1" fill="#1a1a1a" opacity="0.1"/>
    <rect x="19" y="42" width="6" height="6" rx="1" stroke-width="1.2"/>
    <polygon points="22,43 24,45 22,47 20,45" fill="#1a1a1a" opacity="0.3"/>
  </g>
  <g>
    <rect x="27" y="44" width="6" height="6" rx="1" fill="#1a1a1a" opacity="0.1"/>
    <rect x="27" y="44" width="6" height="6" rx="1" stroke-width="1.2"/>
    <polygon points="30,45 32,47 30,49 28,47" fill="#1a1a1a" opacity="0.3"/>
  </g>
  <g>
    <rect x="35" y="44" width="6" height="6" rx="1" fill="#1a1a1a" opacity="0.1"/>
    <rect x="35" y="44" width="6" height="6" rx="1" stroke-width="1.2"/>
    <polygon points="38,45 40,47 38,49 36,47" fill="#1a1a1a" opacity="0.3"/>
  </g>
  <g>
    <rect x="43" y="42" width="6" height="6" rx="1" fill="#1a1a1a" opacity="0.1"/>
    <rect x="43" y="42" width="6" height="6" rx="1" stroke-width="1.2"/>
    <polygon points="46,43 48,45 46,47 44,45" fill="#1a1a1a" opacity="0.3"/>
  </g>
  <!-- Link connectors between settings -->
  <line x1="17" y1="41" x2="19" y2="44" stroke-width="1" opacity="0.6"/>
  <line x1="25" y1="45" x2="27" y2="47" stroke-width="1" opacity="0.6"/>
  <line x1="33" y1="47" x2="35" y2="47" stroke-width="1" opacity="0.6"/>
  <line x1="41" y1="44" x2="43" y2="45" stroke-width="1" opacity="0.6"/>
  <!-- Clasp detail on upper arc -->
  <rect x="29" y="13" width="6" height="3" rx="0.5" fill="#1a1a1a" opacity="0.15" stroke-width="1.2"/>
  <circle cx="32" cy="14.5" r="0.6" fill="#1a1a1a" opacity="0.6"/>
  <!-- Decorative gems along top arc -->
  <circle cx="18" cy="22" r="1" fill="#1a1a1a" opacity="0.4"/>
  <circle cx="24" cy="18" r="1" fill="#1a1a1a" opacity="0.4"/>
  <circle cx="40" cy="18" r="1" fill="#1a1a1a" opacity="0.4"/>
  <circle cx="46" cy="22" r="1" fill="#1a1a1a" opacity="0.4"/>
  <!-- Sparkle -->
  <g stroke-width="1" opacity="0.6">
    <line x1="52" y1="12" x2="52" y2="8" />
    <line x1="50" y1="10" x2="54" y2="10" />
  </g>
</svg>
