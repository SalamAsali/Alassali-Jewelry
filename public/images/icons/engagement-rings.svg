<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#1a1a1a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
  <!-- Ring band (tapered shank) -->
  <path d="M18 42 Q18 52 32 52 Q46 52 46 42" />
  <path d="M18 42 Q18 34 22 32" />
  <path d="M46 42 Q46 34 42 32" />
  <!-- Inner band highlight -->
  <path d="M22 44 Q24 49 32 49 Q40 49 42 44" stroke-width="1" opacity="0.4"/>
  <!-- Side accent diamonds on shoulders -->
  <polygon points="22,33 24,32 26,33 24,35" fill="#1a1a1a" opacity="0.2"/>
  <polygon points="38,33 40,32 42,33 40,35" fill="#1a1a1a" opacity="0.2"/>
  <!-- Prong setting (4 prongs visible) -->
  <line x1="26" y1="30" x2="25" y2="22" />
  <line x1="38" y1="30" x2="39" y2="22" />
  <line x1="29" y1="28" x2="29" y2="22" stroke-width="1.2"/>
  <line x1="35" y1="28" x2="35" y2="22" stroke-width="1.2"/>
  <!-- Setting basket -->
  <path d="M25 30 Q32 33 39 30" stroke-width="1.2"/>
  <!-- Round brilliant diamond - outline -->
  <polygon points="32,8 42,20 32,30 22,20" fill="#1a1a1a" opacity="0.08"/>
  <!-- Table (top flat surface) -->
  <polygon points="32,12 38,20 32,24 26,20" fill="#1a1a1a" opacity="0.06"/>
  <!-- Star facets -->
  <line x1="32" y1="8" x2="32" y2="12" stroke-width="1"/>
  <line x1="22" y1="20" x2="26" y2="20" stroke-width="1"/>
  <line x1="38" y1="20" x2="42" y2="20" stroke-width="1"/>
  <line x1="32" y1="24" x2="32" y2="30" stroke-width="1"/>
  <!-- Kite facet lines -->
  <line x1="32" y1="8" x2="26" y2="20" stroke-width="1"/>
  <line x1="32" y1="8" x2="38" y2="20" stroke-width="1"/>
  <line x1="32" y1="30" x2="26" y2="20" stroke-width="1"/>
  <line x1="32" y1="30" x2="38" y2="20" stroke-width="1"/>
  <!-- Culet dot -->
  <circle cx="32" cy="20" r="0.8" fill="#1a1a1a" opacity="0.5"/>
  <!-- Sparkles -->
  <g stroke-width="1.2">
    <line x1="13" y1="16" x2="13" y2="10" />
    <line x1="10" y1="13" x2="16" y2="13" />
  </g>
  <g stroke-width="1" opacity="0.7">
    <line x1="51" y1="12" x2="51" y2="8" />
    <line x1="49" y1="10" x2="53" y2="10" />
  </g>
  <g stroke-width="1" opacity="0.5">
    <line x1="54" y1="24" x2="54" y2="21" />
    <line x1="52.5" y1="22.5" x2="55.5" y2="22.5" />
  </g>
</svg>
